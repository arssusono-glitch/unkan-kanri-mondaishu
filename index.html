]; // end QUESTIONS

// ===========================
// アプリ状態
// ===========================
let selectedCats = new Set([0,1,2,3,4,5]);
let quizMode = 'random';
let quizQuestions = [];
let currentIdx = 0;
let correctCount = 0;
let wrongItems = []; // {qIdx, userAns}
let answered = false;
let historyData = JSON.parse(localStorage.getItem('quiz_history') || '{}');
// historyData[qIdx] = { correct: n, wrong: n }

// ===========================
// 初期化
// ===========================
function init() {
  buildCatGrid();
  updateStats();
}

function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach((cat, i) => {
    const count = QUESTIONS.filter(q => q.catIdx === i).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn selected';
    btn.dataset.catIdx = i;
    btn.innerHTML = `<div class="cat-name">${cat.name}</div><div class="cat-count">${count}問</div>`;
    btn.onclick = () => toggleCat(btn, i);
    grid.appendChild(btn);
  });
}

function toggleCat(btn, idx) {
  if (selectedCats.has(idx)) {
    if (selectedCats.size <= 1) return; // 最低1カテゴリ
    selectedCats.delete(idx);
    btn.classList.remove('selected');
  } else {
    selectedCats.add(idx);
    btn.classList.add('selected');
  }
}

function selectMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  quizMode = btn.dataset.mode;
}

function updateStats() {
  let total = 0, correct = 0;
  Object.values(historyData).forEach(h => {
    total += h.correct + h.wrong;
    correct += h.correct;
  });
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statRate').textContent = total > 0 ? Math.round(correct/total*100) + '%' : '-';
}

// ===========================
// クイズ開始
// ===========================
function startQuiz() {
  let pool = QUESTIONS.filter((q, i) => selectedCats.has(q.catIdx));
  const count = parseInt(document.getElementById('countSelect').value);

  if (quizMode === 'random') {
    pool = shuffle(pool);
  } else if (quizMode === 'weak') {
    pool.sort((a, b) => {
      const ai = QUESTIONS.indexOf(a), bi = QUESTIONS.indexOf(b);
      const ah = historyData[ai] || {correct:0, wrong:0};
      const bh = historyData[bi] || {correct:0, wrong:0};
      const aRate = (ah.correct+ah.wrong===0) ? -1 : ah.correct/(ah.correct+ah.wrong);
      const bRate = (bh.correct+bh.wrong===0) ? -1 : bh.correct/(bh.correct+bh.wrong);
      return aRate - bRate;
    });
  }

  quizQuestions = pool.slice(0, count);
  currentIdx = 0;
  correctCount = 0;
  wrongItems = [];

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ===========================
// 問題表示
// ===========================
let multiSelected = new Set(); // 複数選択モード用

function showQuestion() {
  answered = false;
  multiSelected = new Set();
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;
  const cat = CATEGORIES[q.catIdx];
  const isMulti = Array.isArray(q.ans);

  document.getElementById('progressText').textContent = `問題 ${currentIdx+1} / ${total}`;
  document.getElementById('scoreText').textContent = `正解: ${correctCount}問`;
  document.getElementById('progressFill').style.width = `${(currentIdx/total)*100}%`;

  const catEl = document.getElementById('qCategory');
  catEl.className = `q-category ${cat.color}`;
  // 書籍問題は年度・問番号を表示
  if (q.year) {
    catEl.textContent = `${cat.name}　${q.year} ${q.qNo||''}`;
  } else {
    catEl.textContent = cat.name;
  }

  // 複数選択ヒント
  const oldHint = document.getElementById('multiHint');
  if (oldHint) oldHint.remove();
  if (isMulti) {
    const hint = document.createElement('div');
    hint.id = 'multiHint';
    hint.className = 'multi-hint';
    hint.textContent = `✔ 複数選択（${q.ans.length}つ選んで「回答を確定する」を押してください）`;
    document.getElementById('qText').insertAdjacentElement('beforebegin', hint);
  }

  document.getElementById('qText').textContent = q.q;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const nums = ['①', '②', '③', '④', '⑤'];
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="num-badge">${nums[i]}</span><span>${c}</span>`;
    if (isMulti) {
      btn.onclick = () => toggleMultiChoice(i, btn);
    } else {
      btn.onclick = () => selectAnswer(i, btn);
    }
    choicesEl.appendChild(btn);
  });

  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.style.display = isMulti ? 'block' : 'none';

  const answerBox = document.getElementById('answerBox');
  answerBox.style.display = 'none';
  answerBox.className = 'answer-box';

  document.getElementById('skipBtn').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'none';
}

function toggleMultiChoice(idx, btn) {
  if (answered) return;
  if (multiSelected.has(idx)) {
    multiSelected.delete(idx);
    btn.classList.remove('selected-multi');
  } else {
    multiSelected.add(idx);
    btn.classList.add('selected-multi');
  }
}

function confirmMultiAnswer() {
  if (answered) return;
  const q = quizQuestions[currentIdx];
  if (!Array.isArray(q.ans)) return;
  answered = true;

  const qIdx = QUESTIONS.indexOf(q);
  const selected = Array.from(multiSelected).sort();
  const correct_arr = [...q.ans].sort();
  const correct = JSON.stringify(selected) === JSON.stringify(correct_arr);

  if (!historyData[qIdx]) historyData[qIdx] = {correct:0, wrong:0};
  if (correct) {
    correctCount++;
    historyData[qIdx].correct++;
  } else {
    historyData[qIdx].wrong++;
    wrongItems.push({qIdx, userAns: selected});
  }
  localStorage.setItem('quiz_history', JSON.stringify(historyData));

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach((b, i) => {
    b.disabled = true;
    if (q.ans.includes(i)) b.classList.add('correct');
    else if (multiSelected.has(i)) b.classList.add('wrong');
  });

  const answerBox = document.getElementById('answerBox');
  answerBox.style.display = 'block';
  const correctTexts = q.ans.map(i => `「${q.choices[i]}」`).join('・');
  if (correct) {
    answerBox.className = 'answer-box';
    document.getElementById('answerLabel').textContent = '✅ 正解です！';
  } else {
    answerBox.className = 'answer-box wrong-answer';
    document.getElementById('answerLabel').textContent = `❌ 不正解。正解は ${correctTexts} です。`;
  }
  document.getElementById('answerExp').textContent = q.exp;

  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';
  setTimeout(() => answerBox.scrollIntoView({behavior: 'smooth', block: 'nearest'}), 100);
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = quizQuestions[currentIdx];
  const qIdx = QUESTIONS.indexOf(q);
  const correct = q.ans === idx;

  if (!historyData[qIdx]) historyData[qIdx] = {correct:0, wrong:0};
  if (correct) {
    correctCount++;
    historyData[qIdx].correct++;
  } else {
    historyData[qIdx].wrong++;
    wrongItems.push({qIdx, userAns: idx});
  }
  localStorage.setItem('quiz_history', JSON.stringify(historyData));

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
  });

  const answerBox = document.getElementById('answerBox');
  answerBox.style.display = 'block';
  if (correct) {
    answerBox.className = 'answer-box';
    document.getElementById('answerLabel').textContent = '✅ 正解です！';
  } else {
    answerBox.className = 'answer-box wrong-answer';
    document.getElementById('answerLabel').textContent = `❌ 不正解。正解は「${q.choices[q.ans]}」です。`;
  }
  document.getElementById('answerExp').textContent = q.exp;

  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';
  setTimeout(() => answerBox.scrollIntoView({behavior: 'smooth', block: 'nearest'}), 100);
}

function skipQuestion() {
  const q = quizQuestions[currentIdx];
  const qIdx = QUESTIONS.indexOf(q);
  wrongItems.push({qIdx, userAns: -1});
  nextQuestion();
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQuestions.length) {
    showResult();
  } else {
    showQuestion();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

// ===========================
// 結果表示
// ===========================
function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = quizQuestions.length;
  const rate = Math.round(correctCount/total*100);

  const circle = document.getElementById('scoreCircle');
  document.getElementById('scorePercent').textContent = rate + '%';
  document.getElementById('scoreFrac').textContent = `${correctCount}/${total}問`;

  let bg, title, msg;
  if (rate >= 80) {
    bg = 'linear-gradient(135deg, #276749, #48bb78)';
    title = '合格ライン超え！素晴らしい！🎉';
    msg = '試験本番でも同様の正答率を目指しましょう。';
  } else if (rate >= 60) {
    bg = 'linear-gradient(135deg, #2b6cb0, #63b3ed)';
    title = 'もう少しで合格ライン！💪';
    msg = '苦手分野を重点的に復習しましょう（目標80%以上）。';
  } else {
    bg = 'linear-gradient(135deg, #9b2c2c, #fc8181)';
    title = '基礎から見直しましょう📚';
    msg = '各カテゴリを丁寧に学習し直しましょう。';
  }
  circle.style.background = bg;
  circle.style.color = 'white';
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;

  document.getElementById('rTotal').textContent = total;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rWrong').textContent = total - correctCount;

  // 間違い一覧
  const reviewCard = document.getElementById('reviewCard');
  const reviewList = document.getElementById('reviewList');
  if (wrongItems.length > 0) {
    reviewCard.style.display = 'block';
    reviewList.innerHTML = '';
    wrongItems.forEach(w => {
      const q = QUESTIONS[w.qIdx];
      const item = document.createElement('div');
      item.className = 'review-item';
      const isMulti = Array.isArray(q.ans);
      let userAnsText, correctText;
      if (w.userAns === -1) {
        userAnsText = 'スキップ';
      } else if (isMulti) {
        const ua = w.userAns;
        userAnsText = Array.isArray(ua) ? ua.map(i => `「${q.choices[i]}」`).join('・') : `「${q.choices[ua]}」`;
      } else {
        userAnsText = `「${q.choices[w.userAns]}」`;
      }
      if (isMulti) {
        correctText = q.ans.map(i => `「${q.choices[i]}」`).join('・');
      } else {
        correctText = `「${q.choices[q.ans]}」`;
      }
      const yearLabel = q.year ? `<div style="font-size:0.75rem;color:#718096;margin-bottom:4px">${q.year} ${q.qNo||''}</div>` : '';
      item.innerHTML = `
        ${yearLabel}
        <div class="q">${q.q}</div>
        <div class="a-wrong">✗ あなたの回答: ${userAnsText}</div>
        <div class="a-correct">✓ 正解: ${correctText}</div>
        <div class="exp">${q.exp}</div>
      `;
      reviewList.appendChild(item);
    });
    document.getElementById('retryWrongBtn').style.display = 'block';
  } else {
    reviewCard.style.display = 'none';
    document.getElementById('retryWrongBtn').style.display = 'none';
  }

  window.scrollTo({top: 0, behavior: 'smooth'});
  updateStats();
}

function retryWrong() {
  quizQuestions = wrongItems.filter(w => w.userAns !== -2).map(w => QUESTIONS[w.qIdx]);
  quizQuestions = shuffle(quizQuestions);
  currentIdx = 0;
  correctCount = 0;
  wrongItems = [];
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion();
}

function goHome() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
  updateStats();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// 起動
init();
</script>
