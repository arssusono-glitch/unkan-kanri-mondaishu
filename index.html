<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運行管理者試験対策 問題集（貨物）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a365d, #2b6cb0);
    color: white;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header .badge {
    background: #f6ad55;
    color: #744210;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* ===== START SCREEN ===== */
  #startScreen {
    max-width: 720px;
    margin: 32px auto;
    padding: 0 16px;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  .card h2 { font-size: 1.1rem; color: #2b6cb0; margin-bottom: 16px; border-bottom: 2px solid #bee3f8; padding-bottom: 8px; }

  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .cat-btn {
    padding: 14px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }
  .cat-btn:hover { border-color: #2b6cb0; background: #ebf8ff; }
  .cat-btn.selected { border-color: #2b6cb0; background: #2b6cb0; color: white; }
  .cat-btn .cat-name { font-size: 0.85rem; font-weight: 700; }
  .cat-btn .cat-count { font-size: 0.75rem; opacity: 0.7; margin-top: 3px; }

  .mode-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .mode-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    text-align: center;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: #2b6cb0; }
  .mode-btn.selected { border-color: #2b6cb0; background: #2b6cb0; color: white; }

  .count-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .count-row label { font-size: 0.9rem; white-space: nowrap; }
  .count-row select {
    padding: 8px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.9rem;
  }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #2b6cb0, #1a365d);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .start-btn:hover { opacity: 0.9; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 8px;
  }
  .stat-box {
    text-align: center;
    padding: 12px;
    background: #f7fafc;
    border-radius: 8px;
  }
  .stat-box .num { font-size: 1.5rem; font-weight: 700; color: #2b6cb0; }
  .stat-box .lbl { font-size: 0.75rem; color: #718096; margin-top: 2px; }

  /* ===== QUIZ SCREEN ===== */
  #quizScreen {
    max-width: 720px;
    margin: 24px auto;
    padding: 0 16px;
    display: none;
  }
  .progress-wrap {
    background: white;
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 16px;
  }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: #718096; margin-bottom: 8px; }
  .progress-bar { background: #e2e8f0; border-radius: 999px; height: 8px; }
  .progress-fill { background: linear-gradient(90deg, #48bb78, #2b6cb0); border-radius: 999px; height: 100%; transition: width 0.4s ease; }

  .question-card {
    background: white;
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  .q-category {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .q-text { font-size: 1rem; line-height: 1.7; font-weight: 600; margin-bottom: 20px; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    padding: 14px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.5;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .choice-btn:hover:not(:disabled) { border-color: #4299e1; background: #ebf8ff; }
  .choice-btn .num-badge {
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .choice-btn.correct { border-color: #48bb78; background: #f0fff4; }
  .choice-btn.correct .num-badge { background: #48bb78; color: white; }
  .choice-btn.wrong { border-color: #fc8181; background: #fff5f5; }
  .choice-btn.wrong .num-badge { background: #fc8181; color: white; }
  .choice-btn:disabled { cursor: default; }

  .answer-box {
    margin-top: 16px;
    padding: 16px;
    background: #f0fff4;
    border-left: 4px solid #48bb78;
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    line-height: 1.7;
    display: none;
  }
  .answer-box.wrong-answer { background: #fff5f5; border-left-color: #fc8181; }
  .answer-box .answer-label { font-weight: 700; margin-bottom: 6px; }

  .nav-row { display: flex; gap: 10px; }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .nav-btn:hover { opacity: 0.85; }
  .btn-next { background: #2b6cb0; color: white; }
  .btn-skip { background: #e2e8f0; color: #4a5568; }

  /* ===== RESULT SCREEN ===== */
  #resultScreen {
    max-width: 720px;
    margin: 24px auto;
    padding: 0 16px;
    display: none;
  }
  .result-hero {
    text-align: center;
    padding: 32px 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 2rem;
    font-weight: 800;
  }
  .score-circle .score-sub { font-size: 0.8rem; font-weight: 400; }
  .result-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
  .result-msg { font-size: 0.9rem; color: #718096; }
  .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .result-stat { text-align: center; }
  .result-stat .n { font-size: 1.5rem; font-weight: 700; }
  .result-stat .l { font-size: 0.75rem; color: #718096; }

  .review-list { max-height: 400px; overflow-y: auto; }
  .review-item {
    padding: 14px;
    border-bottom: 1px solid #e2e8f0;
    font-size: 0.85rem;
  }
  .review-item:last-child { border-bottom: none; }
  .review-item .q { font-weight: 600; margin-bottom: 6px; line-height: 1.5; }
  .review-item .a-wrong { color: #e53e3e; margin-bottom: 3px; }
  .review-item .a-correct { color: #38a169; }
  .review-item .exp { color: #718096; margin-top: 6px; font-size: 0.82rem; line-height: 1.6; }

  .action-row { display: flex; gap: 10px; margin-top: 12px; }
  .action-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-retry { background: #2b6cb0; color: white; }
  .btn-home { background: #e2e8f0; color: #4a5568; }

  /* Category colors */
  .cat-0 { background: #ebf8ff; color: #2b6cb0; }
  .cat-1 { background: #f0fff4; color: #276749; }
  .cat-2 { background: #fffaf0; color: #7b341e; }
  .cat-3 { background: #faf5ff; color: #553c9a; }
  .cat-4 { background: #fff5f5; color: #9b2c2c; }
  .cat-5 { background: #fffff0; color: #744210; }

  /* 複数選択モード */
  .multi-hint {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 700;
    color: #744210;
    background: #fefcbf;
    border: 1px solid #f6e05e;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .choice-btn.selected-multi { border-color: #d69e2e; background: #fffff0; }
  .choice-btn.selected-multi .num-badge { background: #d69e2e; color: white; }
  .confirm-btn {
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: linear-gradient(135deg, #d69e2e, #975a16);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .confirm-btn:hover { opacity: 0.88; }
  .q-year-badge {
    font-size: 0.75rem;
    color: #718096;
    margin-bottom: 6px;
  }

  @media (max-width: 480px) {
    .category-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🚛 運行管理者試験対策 問題集</h1>
  </div>
  <span class="badge">貨物</span>
</header>

<!-- ===== START SCREEN ===== -->
<div id="startScreen">
  <div class="card">
    <h2>📊 学習状況</h2>
    <div class="stats-row">
      <div class="stat-box">
        <div class="num" id="statTotal">0</div>
        <div class="lbl">解答済み</div>
      </div>
      <div class="stat-box">
        <div class="num" id="statCorrect">0</div>
        <div class="lbl">正解</div>
      </div>
      <div class="stat-box">
        <div class="num" id="statRate">-</div>
        <div class="lbl">正答率</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📚 出題カテゴリ</h2>
    <div class="category-grid" id="catGrid"></div>
  </div>

  <div class="card">
    <h2>⚙️ 出題設定</h2>
    <div class="mode-row">
      <button class="mode-btn selected" data-mode="random" onclick="selectMode(this)">🔀 ランダム</button>
      <button class="mode-btn" data-mode="weak" onclick="selectMode(this)">⚠️ 苦手優先</button>
      <button class="mode-btn" data-mode="order" onclick="selectMode(this)">📋 順番通り</button>
    </div>
    <div class="count-row">
      <label>出題数：</label>
      <select id="countSelect">
        <option value="10">10問</option>
        <option value="20">20問</option>
        <option value="30" selected>30問</option>
        <option value="50">50問</option>
        <option value="9999">全問</option>
      </select>
    </div>
    <button class="start-btn" onclick="startQuiz()">▶ 試験を開始する</button>
  </div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="quizScreen">
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progressText">問題 1 / 30</span>
      <span id="scoreText">正解: 0問</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="question-card">
    <span class="q-category" id="qCategory"></span>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choices"></div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmMultiAnswer()">✅ 回答を確定する</button>
    <div class="answer-box" id="answerBox">
      <div class="answer-label" id="answerLabel"></div>
      <div id="answerExp"></div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn btn-skip" id="skipBtn" onclick="skipQuestion()">スキップ →</button>
    <button class="nav-btn btn-next" id="nextBtn" onclick="nextQuestion()" style="display:none">次の問題 →</button>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="resultScreen">
  <div class="result-hero">
    <div class="score-circle" id="scoreCircle">
      <span id="scorePercent">0%</span>
      <span class="score-sub" id="scoreFrac"></span>
    </div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="n" id="rTotal" style="color:#2b6cb0"></div>
        <div class="l">出題数</div>
      </div>
      <div class="result-stat">
        <div class="n" id="rCorrect" style="color:#38a169"></div>
        <div class="l">正解</div>
      </div>
      <div class="result-stat">
        <div class="n" id="rWrong" style="color:#e53e3e"></div>
        <div class="l">不正解</div>
      </div>
    </div>
  </div>

  <div class="card" id="reviewCard" style="display:none">
    <h2>📝 間違えた問題</h2>
    <div class="review-list" id="reviewList"></div>
  </div>

  <div class="action-row">
    <button class="action-btn btn-home" onclick="goHome()">🏠 トップに戻る</button>
    <button class="action-btn btn-retry" onclick="retryWrong()" id="retryWrongBtn">⚠️ 間違えた問題を再挑戦</button>
  </div>
</div>

<script>
// ===========================
// 問題データベース
// ===========================
const CATEGORIES = [
  { name: '貨物自動車運送事業法', color: 'cat-0' },
  { name: '道路運送車両法',       color: 'cat-1' },
  { name: '道路交通法',           color: 'cat-2' },
  { name: '労働基準法・改善基準告示', color: 'cat-3' },
  { name: '実務上の知識及び能力', color: 'cat-4' },
  { name: '📖 書籍掲載問題（過去問・模擬）', color: 'cat-5' },
];

// catIdx: カテゴリ番号(0〜4), ans: 正解番号(0始まり)
const QUESTIONS = [

{"catIdx": 0, "q": "一般貨物自動車運送事業を経営しようとする者が受けなければならない手続きはどれか？", "choices": ["届出", "認可", "許可", "登録"], "ans": 2, "exp": "一般貨物自動車運送事業の経営には国土交通大臣の「許可」が必要（貨物自動車運送事業法第3条）。"},
{"catIdx": 0, "q": "貨物軽自動車運送事業を経営しようとする者に必要な手続きはどれか？", "choices": ["許可", "認可", "届出", "登録"], "ans": 2, "exp": "貨物軽自動車運送事業は国土交通大臣への「届出」で足りる（第36条）。許可は不要。"},
{"catIdx": 0, "q": "特定貨物自動車運送事業において、運送の相手先として正しいものはどれか？", "choices": ["不特定多数の荷主", "特定の単数の荷主", "特定の複数の荷主", "制限なし"], "ans": 1, "exp": "特定貨物自動車運送事業は「特定の単一荷主」の貨物のみを運送する事業（第2条第3項）。"},
{"catIdx": 0, "q": "運行管理者の選任義務が生じる事業用自動車の台数はいくつ以上か？", "choices": ["1両", "3両", "5両", "10両"], "ans": 2, "exp": "事業用自動車が5両以上の営業所は運行管理者を1名以上選任しなければならない（施行規則第18条）。"},
{"catIdx": 0, "q": "事業用自動車30両の営業所で最低限必要な運行管理者の人数は何名か？", "choices": ["1名", "2名", "3名", "4名"], "ans": 0, "exp": "5〜30両は1名。31〜60両で2名。30両は1名で足りる（施行規則第18条第2項）。"},
{"catIdx": 0, "q": "事業用自動車90両の営業所で最低限必要な運行管理者の人数は何名か？", "choices": ["2名", "3名", "4名", "5名"], "ans": 1, "exp": "5両で1名、以後30両ごとに1名加算。90両の場合：1＋(90-5)/30の切り上げ=1+2.8→3名となる。"},
{"catIdx": 0, "q": "運行管理者資格者証の交付を受けることができない者に該当するのはどれか？", "choices": ["過去に交通違反で反則金を納付した者", "運行管理者試験に合格した者", "実務経験5年以上の者", "資格者証取消から2年を経過していない者"], "ans": 3, "exp": "資格者証の取消処分を受けてから2年を経過しない者は交付を受けられない（法第19条）。"},
{"catIdx": 0, "q": "補助者が運行管理者に代わり点呼を行う場合、管理者自身が行う点呼の割合として正しいのはどれか？", "choices": ["全点呼の1/3以上", "全点呼の1/2以上", "全点呼の2/3以上", "全点呼の3/4以上"], "ans": 1, "exp": "補助者に点呼の一部を行わせる場合、管理者は全点呼の「1/2以上」を自ら行わなければならない（施行規則第24条第2項）。"},
{"catIdx": 0, "q": "乗務前点呼で確認しなければならない事項として、誤っているものはどれか？", "choices": ["酒気帯びの有無", "疾病・疲労・睡眠不足の有無", "日常点検の実施確認", "当日の荷物の重量"], "ans": 3, "exp": "乗務前点呼の確認事項は①酒気帯び②疾病・疲労・睡眠不足③日常点検確認。荷物重量は含まれない（施行規則第24条）。"},
{"catIdx": 0, "q": "乗務後点呼で確認しなければならない事項として、誤っているものはどれか？", "choices": ["酒気帯びの有無", "乗務中の事業用自動車の状況", "道路及び運行の状況", "翌日の運行経路"], "ans": 3, "exp": "乗務後点呼の確認事項は①酒気帯び②車両状況③道路・運行状況。翌日の経路確認は乗務前点呼の内容（施行規則第24条）。"},
{"catIdx": 0, "q": "中間点呼が必要となる条件として正しいのはどれか？", "choices": ["乗務前・乗務後点呼がいずれも対面で実施できない場合", "乗務前点呼のみ対面できない場合", "乗務後点呼のみ対面できない場合", "長距離運行の場合は必ず必要"], "ans": 0, "exp": "乗務前・乗務後いずれも対面できない場合、運行の途中で中間点呼を行わなければならない（施行規則第24条第4項）。"},
{"catIdx": 0, "q": "IT機器を使った点呼（IT点呼）が実施できる営業所間の要件として正しいのはどれか？", "choices": ["同一の地方運輸局管内", "同一都道府県内", "同一会社内ならどこでも", "同一運輸局管内で対面なしの場合のみ"], "ans": 0, "exp": "IT点呼は「同一の地方運輸局管内」の営業所との間で実施できる（「IT点呼に関する通達」）。"},

{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問9", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が行う点呼等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、乗務前の点呼において運転者に対し、酒気帯びの有無について報告を求め、アルコール検知器を使用して確認しなければならない。", "事業者は、アルコール検知器を営業所ごとに備え、使用可能な状態に保持しなければならない。", "事業者は、乗務後の点呼において、当該乗務を行った運転者に対し、道路交通法第67条（交通事故の場合の措置）の規定による措置を講じたか否かについて確認を行わなければならない。", "事業者は、運行管理者が行うことが困難な場合には、補助者（運行管理者の補助者をいう。）に乗務前及び乗務後の点呼の全部を行わせることができる。"], "ans": 3, "exp": "補助者は点呼の一部を行うことができるが、全部を行わせることはできない。点呼の3分の2は運行管理者が行わなければならない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問10", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の運行管理者が行う業務に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、一定の数以上の事業用自動車（乗車定員11人以上の自動車にあっては1両以上、その他の自動車にあっては5両以上）の運行を管理する営業所ごとに、一定の人数以上の運行管理者を選任しなければならない。", "運行管理者は、運転者等が事業用自動車の運行中に運行管理者と連絡することができる体制の整備に関する業務を行う。", "運行管理者は、乗務員が有効に利用することができるように、休憩に必要な施設を整備し、及び乗務員に睡眠を与える必要がある場合は睡眠に必要な施設を整備し、これらの施設を適切に管理・保守する業務を行う。", "運行管理者は、運転者の運転適性に関する診断の結果及び運転者が行った危険の予測・回避に係る運転中の状況等について、常時把握し、必要な場合には指導及び監督を行う業務を行う。"], "ans": 2, "exp": "休憩・睡眠施設の整備・管理は事業者の義務であり、運行管理者の業務ではない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問11", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が事業用自動車の運転者に対して行う指導及び監督に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、国土交通大臣が認定する適性診断であって国土交通省令で定めるものを受けさせた場合には、事業用自動車の運転者として新たに雇い入れた者については、雇い入れた後（やむを得ない事情がある場合には、雇い入れた後1ヵ月以内）に当該診断を受けさせなければならない。", "事業者は、事業用自動車に係る事故が発生した場合には、事故の再発防止のための対策を検討し、適切な措置を講じなければならない。", "事業者は、特定の運転者に対して、国土交通大臣が告示で定める適性診断（以下「適性診断」という。）を受けさせなければならない。この場合において、死者又は重傷者を生じた交通事故（以下「重大事故」という。）を起こした運転者に対しては、当該重大事故を起こした後、再度乗務する前に当該適性診断を受けさせなければならない。", "事業者は、初任運転者（当該事業者において初めて事業用自動車に乗務する前3ヵ月間に他の一般貨物自動車運送事業者により運転者として常時選任されたことがある者を除く。）に対して、当該事業者において乗務を開始する前に実技による指導を実施しなければならない。"], "ans": 0, "exp": "初任適性診断（新たに雇い入れた者への適性診断）は、雇い入れた後ではなく、初めて事業用自動車に乗務する前に受けさせなければならない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問12", "q": "一般貨物自動車運送事業者が行う運行管理の方法に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車の乗務員が有効に利用することができるように、営業所、又は乗務員が業務前後に立ち寄る場所に、休憩に必要な施設を整備し、及び乗務員に睡眠を与える必要がある場合は睡眠に必要な施設を整備するとともに、これらの施設を適切に管理し、及び保守しなければならない。", "事業者は、事業用自動車の運行の安全を確保するために、乗務員の健康状態の把握に努めるとともに、疾病、疲労、睡眠不足その他の理由により安全な運転をし、又はその補助をすることができないおそれがある乗務員を事業用自動車に乗務させてはならない。", "事業者は、毎年1回定期的に、事業用自動車の運転者に対して少なくとも1時間以上の運転適性検査を実施しなければならない。", "事業者は、法令で定める安全基準に従って、事業用自動車の定期点検を実施し、及びその他日常的な点検を行わせ、これらの点検の結果に基づいて、運行の可否を決定するとともに、適切な整備を行わせなければならない。"], "ans": 0, "exp": "休憩・睡眠施設は「営業所、又は乗務員が業務前後に立ち寄る場所」ではなく、「営業所又は乗務員が就労するため集合又は解散する場所」に整備しなければならない。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問13", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の過積載の防止に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、過積載による運行を防止するため、当該過積載による運行を指示することがないよう、輸送の安全に係る指導を行わなければならない。", "事業者は、荷主から貨物の運送を引き受ける場合、貨物の重量が最大積載量を上回っていることを認識した場合でも、荷主との関係上、直ちに荷主に過積載であることを告知することができない場合がある。", "事業者は、過積載の運行をすることとなるおそれがある場合には、荷主に対してその旨を告知し、過積載による運行をしないよう求めなければならない。", "国土交通大臣（または地方運輸局長に委任）は、過積載による運行が行われた場合において必要があると認めるときは、当該運行に係る貨物の送り主に対し、過積載による運行の防止を図るため必要な措置をとるべきことを勧告することができる。"], "ans": 1, "exp": "事業者は過積載と認識した場合、荷主に直ちに告知しなければならない義務がある。荷主との関係を理由に告知しないことは許されない。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問14", "q": "貨物自動車運送事業の安全管理規程等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["特定の規模以上の一般貨物自動車運送事業者は、安全管理規程を定め、国土交通大臣に届け出なければならない。これを変更しようとする場合も同様とする。", "特定の規模以上の一般貨物自動車運送事業者は、安全統括管理者を選任しなければならない。安全統括管理者を選任したときは、遅滞なく、その旨を国土交通大臣に届け出なければならない。これを解任した場合も同様とする。", "安全管理規程は、輸送の安全を確保するために事業者が遵守すべき事項及び安全統括管理者の責務等を内容とするものであって、国土交通省令で定める基準に適合するものでなければならない。", "安全統括管理者は、事業用自動車の安全な運行に関し、事業者の業務を統括管理する者であり、社員・役員等、一定の要件を満たした者でなければならない。安全統括管理者の権限及び責務の範囲内において、他の安全管理に関する業務を担当する者に対して、職務上の指揮・命令等を行うことができる。"], "ans": [2, 3], "exp": "選択肢3：安全管理規程の内容は「事業者が遵守すべき事項及び安全統括管理者の責務等」ではなく「安全管理体制の構築・改善に関する事項」等が正しい。選択肢4：安全統括管理者の指揮・命令は「職務上」ではなく「輸送の安全を確保するための事項に係る業務上」が正しい。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問15", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の事業用自動車の運転者（以下「運転者」という。）に対する指導・監督に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、運転者が長距離運転または夜間の運転に従事する場合であって、疲労等により安全な運転を継続することができないおそれがあるときは、あらかじめ、当該運転者と交替するための運転者を配置しておかなければならない。", "事業者は、事業用自動車の運行の安全を確保するために、国土交通大臣が告示で定める「運転者が遵守すべき事項」に関する事項について、運転者に対する適切な指導及び監督を怠ってはならない。これらの指導及び監督の実施時期は、やむを得ない理由がある場合を除き、初めて乗務する前に行わなければならない。", "特定の運転者に対して国土交通大臣が認定する適性診断（特定診断II）を受けさせなければならない運転者は、軽傷者（法令で定める傷害の程度）を生じた交通事故を起こした運転者（当該事故前の1年間に交通事故を起こしていない者を除く。）及び運転者として選任された後の初めての適性診断（初任診断）を受診していない運転者である。", "事業者は、適齢診断（高齢運転者のための適性診断）を、65歳に達した日以後1年以内に1回受診させ、その後は3年以内ごとに1回受診させなければならない。"], "ans": [0, 1], "exp": "選択肢1は正しい。選択肢2は正しい。選択肢3：特定診断IIは「軽傷者を生じた事故」ではなく「死傷事故を起こした運転者（一定の条件）」等が対象。選択肢4：適齢診断は65歳以上は「1年以内ごとに1回」が正しい（3年以内ごとではない）。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問16", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の運行管理者の業務に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["運行管理者は、国土交通大臣が告示で定める基準に従って、運転者の勤務時間及び乗務時間を定め、当該運転者にこれらを遵守させなければならない。", "運行管理者は、事業用自動車に係る事故が発生した場合には、事故の発生場所、死傷者の数及び積載物の種類等の情報を直ちに国土交通大臣に報告しなければならない。", "運行管理者は、異常気象その他の理由により輸送の安全の確保に支障が生ずるおそれがあるときは、乗務員に対する適切な指示その他輸送の安全を確保するために必要な措置を講じなければならない。", "運行管理者は、乗務員が有効に利用することができるように、休憩に必要な施設を整備し、及び乗務員に睡眠を与える必要がある場合は睡眠に必要な施設を整備し、これらの施設を適切に管理し、及び保守しなければならない。"], "ans": [1, 3], "exp": "選択肢2：事故報告は「国土交通大臣に報告」が誤り。正しくは速報が必要な場合に地方運輸局長への報告。また直ちに報告が必要なのは重大事故。選択肢4：休憩・睡眠施設の整備・管理は事業者の義務であり運行管理者の業務ではない。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問17", "q": "次の自動車事故に関する記述のうち、一般貨物自動車運送事業者が自動車事故報告規則に基づき国土交通大臣に報告しなければならない事故に該当するものを1つ選びなさい。", "choices": ["事業用自動車が走行中にタイヤがパンクし、10分間道路上に停車したが、負傷者は発生しなかった。", "事業用自動車が他の自動車と接触し、当該他の自動車の運転者が翌日に病院へ行き、医師から10日間の治療を要する旨の診断を受けた。", "事業用自動車が踏切において電車と接触し、電車の運行を60分遅延させた。", "事業用自動車の運転者が運転中に脳疾患を発症し、意識を失ったが、幸い事業用自動車は安全な場所に停車することができ、死傷者は発生しなかった。"], "ans": 3, "exp": "自動車事故報告規則に定める報告が必要な事故：運転者が運転中に意識を失うなど、事業用自動車の運行ができなくなった場合は報告が必要。選択肢3は電車遅延が「3時間以上」でなければ報告不要。選択肢2は「30日以上の治療が必要」でなければ報告不要。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問14", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が運転者等に対して行う安全のための指導・監督に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車に係る事故が発生した場合には、「事故の記録」を作成し、その記録を事故の発生した日から3年間（重大事故については5年間）保存しなければならない。", "事業者は、国土交通大臣が告示で定める基準に従って、事業用自動車の運転者の勤務時間及び乗務時間を定め、当該運転者にこれらを遵守させなければならない。", "事業者は、軽傷者（法令で定める傷害の程度）を生じた交通事故を起こした運転者（当該事故前の1年間に交通事故を起こしていない者を除く。）に対して、国土交通大臣が告示で定める適性診断（特定診断I）を受けさせなければならない。", "事業者は、運転者を新たに雇い入れたとき、当該運転者について、自動車安全運転センターが交付する無事故・無違反証明書又は運転記録証明書等により、雇い入れる前の事故歴を把握し、事故歴等を勘案して特に必要があると認める場合には指導及び監督を行わなければならない。"], "ans": [1, 3], "exp": "選択肢2は正しい。選択肢4は正しい。選択肢1：事故の記録は3年間保存（重大事故でも3年間）。選択肢3：「軽傷者を生じた事故を起こした者（前1年間に事故あり）」は特定診断Iではなく特定診断Iが対象。正確には「死者または重傷者を生じた事故を起こした者」が特定診断II対象。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問15", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が行う運行管理に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、乗務員が有効に利用することができるように、休憩に必要な施設を整備し、乗務員に睡眠を与える必要がある場合には睡眠に必要な施設を整備し、かつ、これらの施設を適切に管理し、及び保守しなければならない。", "事業者は、事業計画に従い業務を行うに必要な員数の事業用自動車の運転者を常時選任しておかなければならない。この場合、選任する運転者は、日々雇い入れられる者、2ヵ月以内の期間を定めて使用される者又は試みの使用期間中の者（14日を超えて引き続き使用されるに至った者を除く。）であってはならない。", "運行管理者の業務を補助させるための補助者を選任した場合は、当該補助者に点呼の全部を行わせることができる。ただし、補助者が行う点呼は、運行管理者が直接行う点呼よりもその確認事項に制限がある。", "事業者は、運行管理者が休暇、病気等の理由により不在となる場合には、その代わりに運行管理者資格者証を有する者を代理の運行管理者として選任することができる。"], "ans": [0, 1], "exp": "選択肢1は正しい。選択肢2は正しい。選択肢3：補助者には点呼の全部を行わせることはできない（3分の1以下）。選択肢4：代理の運行管理者の選任には資格者証だけでなく一定の要件が必要。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問16", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の過積載の防止等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、過積載による運行を防止するため、当該過積載による運行を指示することがないよう、輸送の安全に係る指導を行わなければならない。", "事業者は、貨物の重量等について荷主から通知を受けた場合には、その通知に基づき貨物の重量を確認し、最大積載量内に収まるよう必要な措置を講じなければならない。", "国土交通大臣は、過積載による運行が行われた場合において必要があると認めるときは、当該運行に係る貨物の送り主に対し、過積載による運行の防止を図るため必要な措置をとるべきことを勧告することができる。", "事業者は、過積載の運行をすることとなるおそれがある場合には、荷主に対してその旨を告知し、過積載による運行をしないよう求めなければならない。"], "ans": 2, "exp": "過積載防止に関する勧告権限は「国土交通大臣」ではなく「地方運輸局長」が行うものとされている（または委任を受けた者）。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問13", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の輸送の安全に係る情報の公表等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、輸送の安全に関する基本的な方針を作成し、かつ、これを従業員に対して周知させなければならない。", "事業者は、毎事業年度の経過後100日以内に、輸送の安全に関する基本的な方針その他の輸送の安全にかかわる情報であって国土交通省令で定めるものを公表しなければならない。", "事業者は、輸送の安全に関する計画を作成し、かつ、これを実施し、その結果を適切に評価し、適切な改善を実施するという取組みを継続的に行うよう努めなければならない。", "特定の規模以上の一般貨物自動車運送事業者は、安全管理規程を定め、国土交通大臣に届け出なければならない。"], "ans": 1, "exp": "輸送の安全に関する情報の公表は「毎事業年度の経過後100日以内」ではなく「毎事業年度の経過後３ヵ月以内」に行わなければならない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問14", "q": "貨物自動車運送事業法に定める運行管理者資格者証（以下「資格者証」という。）に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["資格者証の交付を受けた者は、資格者証を亡失し、滅失し、汚損し、又は破損したときは、国土交通大臣に資格者証の再交付を申請することができる。", "国土交通大臣は、試験に合格した者に対して、資格者証を交付する。", "資格者証の交付を受けた者が貨物自動車運送事業法もしくは同法に基づく命令の規定に違反したときは、国土交通大臣は資格者証の返納を命ずることができる。", "国土交通大臣は、運行管理者資格者証の交付を受けた後、貨物自動車運送事業者において運行管理者として選任された経験が通算3年以上の者に対しては、運行管理者一般講習の受講を免除する。"], "ans": 3, "exp": "一般講習の免除規定はない。運行管理者は5年ごとに一般講習の受講が義務付けられており、選任経験の年数による免除はない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問15", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の事業用自動車の運行の安全確保のために運行管理者が行う業務に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["運行管理者は、乗務員等が事業用自動車の運行中に運行管理者と連絡することができる体制を整備し、かつ、当該体制の整備に関する業務を行わなければならない。", "運行管理者は、各営業所の規模（事業用自動車の数）に応じて定める員数の運行管理者を営業所ごとに選任しなければならない。", "運行管理者は、事業用自動車に自動車検査証を備え付けさせなければならない。", "運行管理者は、乗務員等の健康状態の把握に努め、疾病、疲労、睡眠不足その他の理由により安全な運転をし、又はその補助をすることができないおそれがある乗務員等を事業用自動車に乗務させてはならない。"], "ans": [0, 3], "exp": "選択肢1は正しい。選択肢4は正しい。選択肢2：運行管理者の選任は「事業者」の義務であり、運行管理者自身の業務ではない。選択肢3：自動車検査証の備え付けは事業者の義務であり、運行管理者の業務として特定されるものではない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問16", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の運行管理者の選任等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、運行管理者を選任したときは、遅滞なく、その旨を国土交通大臣（地方運輸局長）に届け出なければならない。これを解任したときも同様とする。", "事業者は、運行管理者が不在の場合でも輸送の安全を確保するため、運行管理者資格者証を有する者から補助者を選任することができる。", "事業者は、事業用自動車の数が200両以上の規模の営業所には、3名以上の運行管理者を選任しなければならない。", "事業者は、運行管理者が欠けるに至ったときは、2週間以内に新たな運行管理者を選任しなければならない。"], "ans": 2, "exp": "事業用自動車200両以上の営業所に必要な運行管理者の人数は「3名以上」ではなく、車両数を29で割った数（小数点切り上げ）に1を足した数（最低2名）となる規定。200両の場合は200÷29=6.89→7+1=8名以上が必要。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問17", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の運転者の乗務等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、業務上の事由によりその所有又は使用する事業用自動車等が損傷し、若しくは当該事業用自動車等の装備、附属物等が損傷し、又は亡失した場合においては、その損害の賠償について、労使で協議のうえ、運転者等に負担させることができる。", "事業者は、運転者が長距離運転または夜間の運転に従事する場合であって、疲労等により安全な運転を継続することができないおそれがあるときは、あらかじめ、当該運転者と交替するための運転者を配置しておかなければならない。", "事業者は、事業用自動車の運転者として、日々雇い入れられる者を選任することができる。", "事業者は、国土交通大臣が告示で定める基準に従って、事業用自動車の運転者の勤務時間及び乗務時間を定め、当該運転者にこれらを遵守させなければならない。"], "ans": [0, 2], "exp": "選択肢1は正しい（損害賠償の労使協議）。選択肢3は正しい（日々雇い入れられる者は常時選任の運転者にはなれないが、事業用自動車を運転することは可能）。選択肢2：交替運転者の配置は「長距離または夜間」ではなく疲労等のおそれがある場合が要件。選択肢4：勤務時間・乗務時間の設定は「事業者」の義務。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問18", "q": "次の記述のうち、一般貨物自動車運送事業者が事業用自動車の運転者に対して行う乗務前及び乗務後の点呼において確認しなければならない事項に関する次の記述のうち、正しいものを2つ選びなさい。", "choices": ["乗務前の点呼では、道路運送車両法の規定による日常点検の実施又はその確認について報告を求め確認しなければならない。", "乗務後の点呼では、道路運送車両法の規定による日常点検の実施又はその確認について報告を求め確認しなければならない。", "乗務後の点呼では、当該乗務に係る事業用自動車、道路及び運行の状況について報告を求めなければならない。", "乗務前の点呼では、当該乗務に係る事業用自動車、道路及び運行の状況について報告を求めなければならない。"], "ans": [0, 2], "exp": "日常点検の確認は乗務前点呼の事項。乗務後は事故・道路状況の報告が必要。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問19", "q": "貨物自動車運送事業輸送安全規則に定める運行記録計による記録等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["一般貨物自動車運送事業者は、デジタル式運行記録計を、一定の基準に従い、事業用自動車に備え付けなければならない。", "事業者は、乗務員が事業用自動車に乗務した場合に、運行記録計が記録しなければならない事項として、最高速度、運転時間、車両総重量が含まれる。", "デジタル式運行記録計は、運転者の運行中の速度変化、急加速・急ブレーキ等のデータを記録するとともに、疲労危険速度についての確認ができるものである。", "一般貨物自動車運送事業者は、デジタル式運行記録計によって記録した記録を1年間保存しなければならない。"], "ans": 0, "exp": "デジタル式運行記録計（デジタコ）の記録事項は、最高速度・運転時間・急加速・急ブレーキ等だが、「車両総重量」は記録事項ではない。また保存は1年間が正しい。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問20", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の輸送の安全に係る情報の公表に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、毎事業年度の経過後3ヵ月以内に、輸送の安全に関する基本的な方針その他の輸送の安全にかかわる情報であって国土交通省令で定めるものを公表しなければならない。", "事業者は、輸送の安全に関する計画を作成し、かつ、これを実施し、その結果を適切に評価し、適切な改善を実施するという取組みを継続的に行うよう努めなければならない。", "事業者が公表しなければならない輸送の安全にかかわる情報には、輸送の安全に関する基本的な方針のほか、重大事故の件数及び事故による死傷者数が含まれる。", "事業者は、輸送の安全に関する基本的な方針を作成し、かつ、これを従業員に対して周知させなければならない。"], "ans": [0, 3], "exp": "選択肢1は正しい（3ヵ月以内公表）。選択肢4は正しい（安全方針の周知義務）。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問21", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が行う点呼に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、アルコール検知器（呼気中のアルコールを検知する機器であって、国土交通大臣が告示で定めるものをいう。以下同じ。）を営業所ごとに備え、使用可能な状態に保持しなければならない。", "乗務前の点呼を電話その他の方法で行う場合には、乗務員に対して運行に必要な情報のみを確認すればよく、アルコールの有無について確認する必要はない。", "事業者は、点呼を行った場合には、運転者ごとに点呼を行った旨、報告、確認及び指示の内容ならびに其の他の法令で定める事項を記録し、かつ、その記録を1年間保存しなければならない。", "乗務前の点呼及び乗務後の点呼のいずれも対面により行うことができない乗務（やむを得ない場合を除く。）については、電話その他の方法によるほか、中間点呼を行わなければならない。"], "ans": [0, 1], "exp": "選択肢1は正しい（アルコール検知器の保持義務）。選択肢2は正しい（電話点呼でもアルコール確認は不要とする規定）。選択肢3：点呼記録の保存は「3年間」。選択肢4：中間点呼は「双方」が対面できない場合に必要。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問22", "q": "貨物自動車運送事業輸送安全規則に定める運行指示書及び乗務員台帳の記載等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["一般貨物自動車運送事業者は、運転者が天災その他の事由によって運行指示書に従って運行することができない場合は、電話その他の方法により、運転者に対して所定の事項を指示し、当該運転者が携行している運行指示書に当該指示の内容を記載させなければならない。", "一般貨物自動車運送事業者は、乗務員台帳を当該乗務員の属する営業所に備え置かなければならない。また、乗務員が退職した場合は当該乗務員に係る乗務員台帳を3年間保存しなければならない。", "運行指示書の記載事項のうち「運行の経路並びに主な経由地における発車及び到着の日時」については、具体的な時刻及び地点を記載しなければならない。", "乗務員台帳に記載する「事故歴」は、当該乗務員について把握している過去3年間の事故歴であって、法令の規定に基づいて記録した事故の記録の内容を記載するものとする。"], "ans": 1, "exp": "乗務員台帳の事故歴は「過去3年間」ではなく「過去の事故歴」で、退職した乗務員の台帳は「3年間」保存が正しい。選択肢2は正しい説明をしている可能性があるが、選択肢の内容を精査すると誤りがある。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問23", "q": "貨物自動車運送事業輸送安全規則に定める点呼の記録に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["点呼を行った場合には、運転者ごとに、点呼を行った旨、報告、確認及び指示の内容並びに法令で定める事項を記録しなければならない。", "点呼の記録は、1年間保存しなければならない。", "点呼の実施において、アルコール検知器を使用した場合には、その使用の有無及びその結果を記録しなければならない。", "電話等の方法による点呼を行った場合においても、対面による点呼と同様に点呼の記録を行わなければならない。"], "ans": 3, "exp": "点呼の記録は「1年間」ではなく「3年間」保存しなければならない。選択肢2が誤り。（選択肢4については確認中）写真より正解4と読み取れた。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問18", "q": "貨物自動車運送事業輸送安全規則に定める点呼の実施に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、乗務前の点呼において、運転者に対して少なくとも事業用自動車の運行の安全を確保するために必要な事項を指示しなければならない。", "一般貨物自動車運送事業者は、運行管理者が点呼を行うことが困難な場合には、補助者（補助者として選任された者をいう。）に点呼の全部を行わせることができる。", "業務前及び業務後の点呼のいずれも対面により行うことができない業務（やむを得ない場合を除く。）については、電話その他の方法によるほか、中間点呼を行わなければならない。", "点呼の記録は1年間保存しなければならない。"], "ans": [0, 2], "exp": "選択肢1は正しい（指示の義務）。選択肢3は正しい（中間点呼の要件）。選択肢2：補助者に点呼の全部を行わせることはできない。選択肢4：点呼記録は3年間保存。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問19", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の事業用自動車の運転者の乗務記録に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車に係る運転者の乗務について、乗務記録（乗務等の記録）を作成しなければならない。", "事業者は、乗務記録を1年間保存しなければならない。", "乗務記録には、乗務した運転者の氏名、乗務の開始及び終了の地点及び日時、指示事項の内容、主な経過地点の通過時刻等を記載しなければならない。", "運転者が他の運転者と交替した場合には、交替した運転者に対して行った通告の内容を乗務記録に記載しなければならない。"], "ans": 1, "exp": "乗務記録（乗務等の記録）の保存期間は「1年間」ではなく「3年間」。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問20", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の事業用自動車の日常点検に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車の走行距離、乗務の状況等から判断した適切な時期に日常点検を実施しなければならない。", "事業用自動車の日常点検の結果に基づき、運行の可否を決定するのは事業者（または整備管理者）であり、運行管理者が運行の可否を決定することはできない。", "事業者は、日常点検の結果、当該事業用自動車が道路運送車両法の保安基準に適合しなくなるおそれのある状態又は適合しない状態にあるときは、保安基準に適合するまでの間、当該事業用自動車を運行の用に供してはならない。", "事業者は、事業用自動車の乗務員が、乗務の開始前に行うべき日常点検を怠り、整備の行き届いていない事業用自動車を運行した場合には、行政処分の対象とならない。"], "ans": [0, 2], "exp": "選択肢1は正しい。選択肢3は正しい。選択肢2：運行の可否は整備管理者等が決定するが、整備管理者がいない場合は事業者が決定する。選択肢4：整備不良車を運行した場合は行政処分の対象となる。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問21", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の安全管理に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車の定期点検整備の記録（点検整備記録簿）を当該事業用自動車に備え置き、最終の記入をした日から2年間保存しなければならない。", "事業者は、貨物の積載を均等に行うための方策を定め、積載装置の転落等の防止のため貨物の積付けその他の措置について運転者に対して指導を行わなければならない。", "事業者は、酒気帯びの有無及び健康状態の把握のため、業務前後の点呼の際に運転者の顔色、目の充血等の確認を行うよう努めることとし、特にアルコール検知器の使用については国土交通大臣が別途定める場合を除き任意とする。", "事業者は、運転者が交通事故を起こした場合には、事故の重大性にかかわらず、警察への通報及び救護措置等所定の措置を取るよう指導しなければならない。"], "ans": [0, 2], "exp": "選択肢1は正しい（点検整備記録簿は2年間保存）。選択肢3は正しい（健康状態確認に努める）。選択肢2：積載の均等化は事業者の義務だが、選択肢の内容に誤りがある可能性がある。選択肢4：警察への通報は義務であり、重大性に関わらず当然のこと。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問22", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の事業用自動車に係る事故の記録及び報告に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車に係る事故が発生した場合には、事故の発生日時及び場所、当該事故における死傷者の数及び積載物の種類等の所定の事項を記録し、その記録を事故の発生した日から3年間保存しなければならない。", "事業者は、自動車事故報告規則に基づき、事業用自動車に係る一定の重大な事故（速報が必要なものを除く。）については、30日以内に地方運輸局長に報告しなければならない。", "事業者は、自動車事故報告規則に基づき、運転者が自動車の運転中に病気（当該自動車の運行中に起因する疾病にあっては、国土交通大臣が定めるものに限る。）により正常な運転ができない状態になった場合で、交通事故が発生した場合は速報を要する。", "事業者は、自動車事故報告規則に基づき、2台以上の事業用自動車の衝突又は接触事故であって、3人以上の死傷者が発生した場合には、速報を要する。"], "ans": 3, "exp": "2台以上の事業用自動車が関与する衝突・接触事故で速報が必要なのは「5人以上の死傷者」が発生した場合（3人以上では不要）。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問23", "q": "貨物自動車運送事業に従事する自動車運転者の運転時間等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["運転時間は、2日（始業時刻から起算して48時間をいう。）を平均し1日当たり9時間、4週間を平均し1週当たり44時間を超えないものとする。", "連続運転時間（1回がおおむね連続10分以上で、かつ、合計が30分以上の運転の中断をすることなく連続して運転する時間をいう。）は、4時間を超えないものとする。", "事業者は、運転者が一の運行における最初の勤務を開始してから最後の勤務を終了するまでの時間（ただし、「自動車運転者の労働時間等の改善のための基準」に定める休息期間を除く。）は、144時間を超えないものとする。", "乗務員が1日（運行が始まってから24時間をいう。以下同じ。）に2人乗務する場合で、車両内に身体を伸ばして休息できる設備があるときは、最大拘束時間を20時間まで延長し、休息期間を4時間まで短縮することができる。"], "ans": 3, "exp": "2人乗務の場合、拘束時間の延長は「20時間」ではなく「24時間（ただし、車内で身体を伸ばして休息できる施設がある場合）」まで。また休息期間の短縮は「4時間」ではなく「8時間（車内休息）」に関連する規定が正しい。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問18", "q": "貨物自動車運送事業に従事する自動車運転者の労働時間等の改善のための基準（以下「改善基準」という。）に定める拘束時間に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["1ヵ月についての拘束時間は、原則として284時間を超えないものとする。", "1日についての拘束時間は、原則として13時間を超えないものとし、最大拘束時間は15時間とする。ただし、宿泊を伴う長距離貨物運送の場合は、当該拘束時間を16時間まで延長することができる。", "1週間についての拘束時間は、原則として65時間を超えないものとする。ただし、労使協定がある場合は、1年のうち6か月については、70時間まで延長することができる。", "運転者が、フェリーに乗船する場合における乗船時間は、原則として休息期間として扱うものとし、乗船中の休息期間は、フェリー下船時刻から次の乗務が開始されるまでの間に与えられる休息期間と合算することができる。"], "ans": [1, 2], "exp": "選択肢2は正しい（1日の拘束時間：原則13時間以内、最大15時間、宿泊長距離は16時間）。選択肢3は正しい（1週間65時間以内、協定あれば70時間まで）。選択肢1：1ヵ月の拘束時間は「284時間」ではなく「293時間」が上限。選択肢4：フェリー乗船中は拘束時間から除く（休息期間に充てる）が合算規定は異なる。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問19", "q": "貨物自動車運送事業に従事する自動車運転者の労働時間等の改善のための基準（以下「改善基準」という。）に定める休日の取扱いに関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["休日は、1週間について1日以上確保しなければならない。ただし、労使協定がある場合には、4週間について3日以上の休日を確保できる日数（4週間で4日以上）を確保するものとする。", "休日は、原則として連続した24時間以上でなければならない。", "休日労働は、1ヵ月について2回以内とする。ただし、労使協定がある場合には、1ヵ月について4回以内とすることができる。", "休日に係る拘束時間が30時間を超えないものとする。"], "ans": 2, "exp": "休日労働は、改善基準では休日の付与に関する規定がある。「1ヵ月2回以内」ではなく、労基法の週休の原則に基づく取扱いとなる。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問20", "q": "貨物自動車運送事業に従事する自動車運転者の労働時間等の改善のための基準（以下「改善基準」という。）に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["1日の最大拘束時間は15時間とする。ただし、宿泊を伴う長距離貨物運送（一定の条件を満たす場合）においては、1日の最大拘束時間を16時間まで延長することができる。", "1ヵ月の拘束時間は、原則として293時間を超えないものとする。ただし、労使協定がある場合には、1年のうち6ヵ月については、320時間まで延長することができる。", "連続運転時間は4時間を超えてはならない。1回がおおむね連続10分以上で、合計が30分以上の運転の中断があった場合は、連続運転時間の計算がリセットされる。", "休息期間は、継続9時間（宿泊長距離の場合は8時間）以上与えなければならない。"], "ans": 3, "exp": "休息期間は「継続8時間以上」が原則。「9時間」は誤り。宿泊を伴う長距離貨物運送の場合は「4分の1の回数まで7時間まで短縮可能」等の規定がある。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問21", "q": "貨物自動車運送事業に従事する自動車運転者の労働時間等の改善のための基準（以下「改善基準」という。）に定める1ヵ月の拘束時間等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["1ヵ月の拘束時間は、原則として293時間を超えないものとする。", "1ヵ月の拘束時間は、労使協定がある場合には、1年のうち6ヵ月については320時間まで延長することができるが、その場合、「1年間の拘束時間が3,516時間を超えないこと」および「1ヵ月の拘束時間が320時間を超えることができるのは連続3ヵ月まで」等の条件がある。", "1日の最大拘束時間は15時間で、1日の拘束時間が15時間を超える回数（ただし宿泊長距離の場合）は、1週間について2回まで（週4日は可能）。", "休息期間は、勤務終了後、継続8時間以上与えなければならない。"], "ans": [0, 3], "exp": "選択肢1は正しい（1ヵ月293時間以内が原則）。選択肢4は正しい（休息期間は継続8時間以上）。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問22", "q": "下図は、貨物自動車運送事業に従事する自動車運転者（1人乗務）の5日間の運行状況を示したものである。この運行における拘束時間等について、改善基準に照らして正しいものを1つ選びなさい。", "choices": ["この5日間の運行状況において、拘束時間は改善基準に違反していない。", "3日目の拘束時間は13時間30分で、改善基準違反がある。", "2日目の拘束時間が最も長く、改善基準違反がある。", "5日目の休息期間が不足しており、改善基準違反がある。"], "ans": 2, "exp": "図表より、各日の拘束時間を計算すると、2日目の拘束時間が最も長く最大拘束時間（15時間）を超えているため改善基準違反となる。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問23", "q": "貨物自動車運送事業に従事する自動車運転者の労働時間等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["使用者は、労働基準法第36条の規定に基づく時間外労働・休日労働に関する協定（36協定）を締結し、これを行政官庁に届け出た場合においても、改善基準に定める最大拘束時間等の限度を超えて自動車運転者を使用してはならない。", "使用者は、一般貨物自動車運送事業に従事する事業用自動車の運転業務に常時従事する自動車運転者については、1日8時間、1週間44時間を超えて、特別条項付き時間外労働・休日労働協定（36協定の特別条項）がある場合は、年720時間まで時間外労働をさせることができる。", "自動車運転者の拘束時間とは、始業時刻から終業時刻までの時間で、労働時間と休憩時間の合計をいう。", "休息期間とは、使用者の拘束を受けない期間のことをいい、拘束時間と休息期間の合計が、翌日の始業時刻からの24時間になるよう設定される。"], "ans": 1, "exp": "自動車運転者の時間外労働の特別条項（36協定）による上限は、一般的な業務の720時間ではなく、自動車運転業務については別途の上限規制が適用される。令和6年4月から年960時間の上限規制が適用された。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問24", "q": "次の点呼記録表の空欄A、B、C、Dに入る語句の正しい組合せを、1～4の中から1つ選びなさい。\n\n（点呼記録表の空欄）\nA：乗務前・乗務後点呼の区分\nB：点呼の実施方法\nC：確認事項（酒気帯びの有無等）\nD：報告・確認・指示内容", "choices": ["A=乗務前、B=対面、C=酒気帯びの有無、D=日常点検の実施確認", "A=乗務後、B=電話、C=健康状態、D=運行状況の報告", "A=乗務前、B=対面、C=疾病・疲労・睡眠不足の有無、D=運行の安全確保に必要な事項", "A=中間、B=電話、C=酒気帯びの有無、D=安全確保の指示"], "ans": 2, "exp": "乗務前点呼の確認事項は酒気帯びの有無、疾病・疲労・睡眠不足等の有無、日常点検の実施確認であり、指示事項は運行の安全確保に必要な事項。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問25", "q": "道路交通法に定める自動車の速度に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車は、法令の規定若しくは警察官の命令により、又は危険を防止するためやむを得ない場合のほか、その進路の前方を進行している車両等の速度よりも遅い速度で進行してはならない。", "自動車の最高速度は、道路標識等により最高速度が指定されていない一般道路においては、大型貨物自動車等は時速60キロメートルを超えて運転してはならない。", "自動車の最高速度は、高速自動車国道において、大型貨物自動車等（車両総重量が8トン以上又は最大積載量が5トン以上のものをいう。）は時速80キロメートルを超えて運転してはならない。", "車両は、道路標識等によりその最高速度が指定されている道路においては、その最高速度を超える速度で進行してはならない。"], "ans": [1, 3], "exp": "選択肢2は正しい（一般道路での大型貨物は60km/h）。選択肢4は正しい（道路標識の最高速度の遵守義務）。選択肢3：高速道路での大型貨物の最高速度は時速80km/hが正しいが選択肢の内容に問題がある可能性。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問26", "q": "道路交通法に定める追い越し等に関する次の記述のうち、誤っているものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車は、他の自動車を追い越そうとするときは、その追い越される自動車の右側を通行しなければならない。ただし、前車が右折のため道路の中央に寄っている場合等の一定の場合は左側を通行することができる。", "車両は、法令の規定若しくは警察官の命令により、又は危険を防止するためやむを得ない場合のほか、その進路の前方を進行している車両等の速度よりも遅い速度で進行してはならない。", "車両は、道路のまがりかど附近、上り坂の頂上附近又は勾配の急な下り坂を通行するとき及びトンネルを通行するときは、前車を追い越してはならない。", "車両は、交差点、踏切、横断歩道又は自転車横断帯及びこれらの手前の側端から前後にそれぞれ5メートル以内の部分においては、停車し、又は駐車してはならない。"], "ans": [1, 2], "exp": "選択肢2は「最低速度」の規定であり追い越し等ではなく速度に関する規定で誤り。選択肢3：トンネル内での追い越し禁止は「車両通行帯がない場合」であり、車両通行帯がある場合は追い越し可能。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問27", "q": "道路交通法に定める車両の灯火及び非常点滅表示灯等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両等は、夜間、道路を通行するときは、前照灯、車幅灯、尾灯その他の灯火をつけなければならない。ただし、夜間でも高速自動車国道においては、「前照灯を消灯する」ことが認められている。", "車両等は、夜間（日没時から日出時までの時間をいう。）以外の時間であっても、トンネルの中、濃霧がかかっている場所その他の場所で、視界が50メートル（高速自動車国道及び自動車専用道路においては200メートル）以内となるような状況においては、前照灯等をつけなければならない。", "緊急自動車の運転者が、当該緊急自動車について指定された緊急の用務を行っていないときは、サイレンを鳴らす必要はないが、赤色の警光灯をつけ続けなければならない。", "車両等は、法令の規定によりその速度を減ずる場合及び停止する場合のほか、同一方向に進行しながら進路を左方に変えるときにも方向指示器を操作しなければならない。"], "ans": [0, 1], "exp": "選択肢1は正しい（夜間の灯火義務）。選択肢2は正しい（視界不良時の灯火義務）。選択肢3：緊急自動車は緊急業務中でないときは赤色警光灯を消さなければならない。選択肢4：進路変更時は方向指示器を操作するが、設問の内容に誤りがある可能性がある。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問28", "q": "次の文中、A、B、C、Dに入るべき字句を下の枠の中から選び、正しいものを組み合わせを1つ選びなさい。\n\n「一般貨物自動車運送事業者は、事業用自動車の運転者（A）に係る労働条件の整備のため、（B）の規定に基づく改善基準について、（C）及び（D）の措置を講じなければならない。」", "choices": ["A=乗務員、B=労働基準法、C=所定の措置、D=適切な指導", "A=乗務員等、B=改善基準告示、C=遵守させるための、D=指導・監督", "A=自動車運転者、B=改善基準告示、C=遵守させるための、D=指導・監督", "A=自動車運転者、B=労働基準法、C=所定の遵守、D=指示・監督"], "ans": 2, "exp": "「自動車運転者」に対し「改善基準告示」の規定に基づき「遵守させるための指導・監督」を行う義務がある。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問29", "q": "運行管理者は、以下の運行計画に基づいて次のA営業所からG地点へ輸送する場合の運行について管理を行った。この運行に関する次の記述のうち、正しいものを1つ選びなさい。\n\n（運行計画）\nA営業所 → B工場（20km） → C料金所（高速）→ D料金所（高速）→ E地点（休憩）→ F地点 → G地点\n※各区間の距離と所要時間が設定されている", "choices": ["この運行計画では、運転時間が改善基準に適合している。", "連続運転時間が4時間を超えており、改善基準に違反している。", "高速道路区間でのC料金所とD料金所間の走行は大型貨物自動車の最高速度規制に違反している。", "E地点での休憩時間を含む総運行時間は改善基準の拘束時間内に収まっている。"], "ans": 2, "exp": "F地点とG地点間の高速道路走行で大型貨物自動車の最高速度（80km/h）を超えて走行している可能性がある。写真の図表から計算すると、この区間の平均速度が規制速度を超えていることが確認される。"},
{"catIdx": 5, "year": "令和3年度CBT試験", "qNo": "問30", "q": "次の事例に基づく多重追突事故に関する設問1、設問2及び設問3に答えなさい。\n\n（事例）高速道路において、先行する乗用車に後続のトラックが追突し、さらに後続のトラック2台が追突するという多重追突事故が発生した。\n\n設問1：この多重追突事故の主な発生原因として、可能性が高いものをすべて選びなさい。\n設問2：この事故を受けて実施すべき再発防止対策として適切なものを選びなさい。\n設問3：この事故における運行管理者の対応として適切なものを選びなさい。", "choices": ["車間距離の不足・前方不注意・速度超過", "整備不良・天候不良・道路構造の問題", "運行管理体制の不備のみが原因", "ドライバーの個人的な問題のみ"], "ans": 0, "exp": "多重追突事故の主な原因は車間距離の不足、前方不注意、速度超過等であり、再発防止には運行管理の強化、ドライバー教育、適切な運行計画が必要。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問24", "q": "次の点呼記録表に関する記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["点呼記録には、乗務員の氏名、乗務する事業用自動車の番号、点呼の実施方法（対面・電話等）を記録しなければならない。", "乗務前点呼では、道路運送車両法の規定による日常点検の実施又はその確認について確認した事項を記録しなければならない。", "乗務後点呼では、道路の状況、事業用自動車の状況及び運行の状況について報告を求め、その内容を記録しなければならない。", "点呼記録は、点呼を行った翌日から起算して1年間保存しなければならない。"], "ans": 3, "exp": "点呼記録は「1年間」ではなく「3年間」保存しなければならない。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問25", "q": "道路交通法に定める大型自動車等の使用者の義務等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["大型自動車等の使用者等は、大型自動車等の整備及び点検について、整備士等を選任し、その整備及び点検についての業務を行わせなければならない。", "大型自動車等の使用者等（以下「使用者等」という。）は、大型自動車等を道路において運行の用に供しようとするときは、あらかじめ、当該大型自動車等の点検を行わなければならない。", "大型自動車等の使用者等は、当該大型自動車等が保安基準に適合しなくなるおそれがある状態又は適合しない状態にあることを確認したときは、保安基準に適合するまでの間、当該大型自動車等を使用してはならない。", "大型自動車等の使用者等は、定期点検整備を行い、その記録簿を作成し、これを保存しなければならない。"], "ans": [1, 3], "exp": "選択肢2は正しい（運行前点検の義務）。選択肢4は正しい（定期点検記録簿の作成・保存）。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問26", "q": "道路交通法に定める車両等の通行区分等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両は、道路の中央から左の部分を通行しなければならない。", "車両通行帯が設けられた道路では、車両は最も左側の車両通行帯を通行しなければならない。ただし、一定の場合には、追い越し等のために他の車両通行帯を通行することができる。", "大型貨物自動車等は、高速自動車国道の本線車道（片側3車線以上）において、最も左側及びその隣の車両通行帯（2車線まで）のみを通行しなければならない。", "緊急自動車が接近してきたときは、一般車両は道路の左側に寄り、一時停止して緊急自動車に道を譲らなければならない。"], "ans": [0, 1, 3], "exp": "選択肢1：車両は「歩道又は路側帯と車道の区別のある道路においては、車道を通行しなければならない」が、必ずしも「中央から左」とは限らない。選択肢2：最も左側の通行帯を通行しなければならないのは特定の大型車両等。選択肢4：交差点付近では一時停止ではなく、交差点を避けて左に寄り停止。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問27", "q": "道路交通法に定める酒気帯び運転等の禁止及び過労運転等の禁止に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両等の運転者は、酒気を帯びて車両等を運転してはならない。", "車両等の使用者は、酒気を帯びている者に対して、当該車両等を運転することを命じ、又は容認してはならない。", "車両等の使用者は、当該車両等の乗務員が運転に支障を及ぼすおそれがある身体の状態にあるにもかかわらず、当該乗務員に車両等を運転させた場合には刑事上の責任を負う可能性があるが、行政上の責任は負わない。", "車両等の運転者は、身体の障害等により安全な運転をすることができないおそれがある場合は、公安委員会の指示を受けて運転に支障を及ぼすおそれがある症状がなくなったことが確認されるまで、運転してはならない。"], "ans": [1, 2], "exp": "選択肢2は正しい（飲酒運転の命令・容認の禁止）。選択肢3は正しい（使用者の刑事責任）。選択肢1は正しいが「酒気を帯びて」は0.15mg/L以上の場合を指す。選択肢4：内容に誤りがある可能性がある。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問28", "q": "次の文中、A、B、C、Dに入るべき字句を下の枠の中から選び、正しい組合せを1つ選びなさい。\n\n「自動車運転者の労働時間等の改善のための基準（改善基準）において、使用者は自動車運転者（以下「運転者」という。）の（A）の途中において（B）時間（合計が（C）時間以上になる場合を含む。）以上の運転の中断なしに、（D）時間を超えて連続して運転させてはならない。」", "choices": ["A=勤務時間、B=おおむね連続10、C=30、D=4", "A=勤務時間、B=10、C=60、D=4", "A=運転時間、B=おおむね連続10、C=30、D=4", "A=運転時間、B=10、C=30、D=5"], "ans": 2, "exp": "改善基準の連続運転時間の規定：「運転時間の途中においておおむね連続10分以上（合計が30分以上になる場合を含む）の中断なしに4時間を超えて連続して運転させてはならない」"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問29", "q": "運行管理者は、以下の運行計画に基づく運行について管理を行った。この運行に関する次の1～3の記述について、正しいか否かを判断しなさい。\n\n（運行計画）A営業所→B地点→C料金所（高速入口）→D料金所（高速出口）→E地点（休憩）→F地点→G地点", "choices": ["1=正しい、2=正しい、3=誤り", "1=正しい、2=誤り、3=正しい", "1=誤り、2=正しい、3=誤り", "1=誤り、2=誤り、3=正しい"], "ans": 1, "exp": "図表の運行計画を分析すると、記述2について距離・時間・速度の計算に誤りがあり違反判定が生じる。記述3については改善基準に適合している。"},
{"catIdx": 5, "year": "令和4年度CBT試験", "qNo": "問30", "q": "次の事例（多重追突事故）に基づく設問1、設問2及び設問3に答えなさい。\n\n（事例）高速道路において渋滞中、トラックが先行する乗用車に追突し、さらに後続のトラックが追突するという多重追突事故が発生した。調査の結果、前方確認不足・車間距離不足が主因であることが判明した。", "choices": ["再発防止策として、運転者に対する教育のみで十分である。", "再発防止策として、デジタコ分析・ドライブレコーダー活用・定期的な安全教育の実施が有効である。", "この事故は天候に起因するものであり、運行管理者の責任は問われない。", "高速道路での事故は自動車専用道路管理者の責任であり、事業者の責任は生じない。"], "ans": 1, "exp": "多重追突事故の再発防止には、デジタコやドライブレコーダーを活用した運転状況の分析、安全教育の実施、適切な運行管理が必要。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問24", "q": "貨物自動車運送事業に従事する自動車運転者の拘束時間等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["1日の拘束時間は、原則13時間を超えてはならず、最大拘束時間は15時間である。", "フェリーに乗船している時間は、拘束時間から除外される（休息期間とみなす）。", "1ヵ月の拘束時間の上限は、原則284時間である。", "2人乗務の場合、1日の最大拘束時間は24時間まで延長できる（車内に身体を伸ばして休息できる設備がある場合）。"], "ans": [0, 3], "exp": "選択肢1は正しい（1日拘束時間：原則13時間、最大15時間）。選択肢4は正しい（2人乗務で設備あり：最大24時間）。選択肢2：フェリー乗船は拘束時間から除外されるが休息期間の扱いには条件がある。選択肢3：1ヵ月の上限は「293時間」。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問25", "q": "道路運送車両法に定める自動車の点検及び整備に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車について、毎3ヵ月ごとに1回、国土交通省令で定める技術上の基準により点検しなければならない（3ヵ月定期点検）。", "事業者は、事業用自動車について、毎12ヵ月ごとに1回、国土交通省令で定める技術上の基準により点検しなければならない（12ヵ月定期点検）。", "点検整備記録簿は、最終の記入をした日から1年間保存しなければならない。", "自動車の使用者等は、点検の結果、当該自動車が道路運送車両法第47条の2第2項の規定による整備を要する状態にあるときは、その自動車を道路において運行の用に供してはならない。"], "ans": [1, 2], "exp": "選択肢2は正しい（12ヵ月定期点検）。選択肢3は正しい（点検整備記録簿の保存：最終記入日から1年間）。選択肢1：事業用自動車（トラック等）の3ヵ月定期点検は正しいが、設問文の内容確認が必要。選択肢4：整備を要する状態での運行禁止は正しいが、他の選択肢との比較で誤りとなる可能性。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問26", "q": "道路交通法に定める速度の規制に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["一般道路において、大型貨物自動車の法定最高速度は60km/hである。", "高速自動車国道において、大型貨物自動車（車両総重量8トン以上または最大積載量5トン以上）の最高速度は80km/hである。", "悪天候時（視界50m以内等）は、道路標識で指定された最高速度の50%以下に速度を落とさなければならない。", "道路標識等により最高速度が指定された道路では、指定された最高速度を超えて運転してはならない。"], "ans": [0, 3], "exp": "選択肢1は正しい（一般道路での大型貨物の最高速度：60km/h）。選択肢4は正しい（道路標識の最高速度の遵守）。選択肢2：高速道路での大型貨物は80km/hが正しいが、この選択肢が正しい場合は1と4が同時に正しいため再確認が必要。選択肢3：悪天候時の速度制限に「50%以下」という規定はない。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問27", "q": "道路交通法に定める交差点等における通行に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両等は、交差点に入ろうとし、及び交差点内を通行するときは、交差道路を通行する車両等、反対方向から来て右折しようとする車両等及び道路の曲がり角付近においては徐行しなければならない。", "車両等は、交通整理が行なわれていない交差点において、当該車両等が通行している道路が優先道路である場合を除き、交差道路を通行する車両等の進行妨害をしてはならない。", "車両等は、横断歩道に接近する場合には、当該横断歩道を渡ろうとする歩行者等がいないことが明らかな場合を除き、当該横断歩道の直前で停止することができるように速度を落として進行しなければならない。", "緊急自動車が交差点に接近する場合、交差点の付近では、交差点を避け、道路の左側（一方通行となっている道路においては左側に寄ることが支障となる場合にあっては、道路の右側）に寄って一時停止しなければならない。"], "ans": [1, 2], "exp": "選択肢2は正しい（優先道路の場合を除く進行妨害の禁止）。選択肢3は正しい（横断歩道接近時の減速義務）。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問28", "q": "次の文中、A、B、C、Dに入るべき語句を下の枠の中から選び、正しい組み合わせを1つ選びなさい。\n\n「労働基準法においては、使用者は、労働者に、休憩時間を除き1週間について（A）時間を超えて、労働させてはならない。また、使用者は、1週間の各日については、休憩時間を除き（B）時間を超えて、労働させてはならない。ただし、36協定を締結した場合には（C）時間（年（D）時間）まで時間外労働をさせることができる。」", "choices": ["A=40、B=8、C=45、D=360", "A=44、B=8、C=60、D=720", "A=40、B=8、C=60、D=720", "A=40、B=9、C=45、D=360"], "ans": 0, "exp": "労働基準法：1週40時間、1日8時間。36協定がある場合は原則として月45時間・年360時間まで（特別条項は年720時間）。設問では原則の36協定の上限を問うている。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問29", "q": "運行管理者は、以下の運行計画を立てた。この運行計画に関する次の1～3の記述について、適切か否かを判断しなさい。\n\n（運行計画）\nA営業所出発（6時）→B地点（荷積み20分）→E地点（休憩30分）→D地点（荷下ろし20分）→A営業所帰着\n・A→B間：20km（平均時速30km）\n・B→E間：50km（往路）（一部高速自動車国道使用）165km（平均時速25km）\n・E→D間：60km（平均時速30km）\n・終業時刻19時30分、翌日始業時刻19時00分予定", "choices": ["1=①280km、2=②違反あり、3=②違反あり", "1=②340km、2=①適合、3=①適合", "1=①280km、2=①適合、3=②違反あり", "1=②340km、2=②違反あり、3=①適合"], "ans": 0, "exp": "写真より正解は①280km、②違反あり、③違反あり。運行距離の計算と改善基準との照合で違反が確認される。"},
{"catIdx": 5, "year": "令和5年度CBT試験", "qNo": "問30", "q": "次の交差点の写真を見て、この交差点における危険予知として最も適切な組合せを、1～4の中から1つ選びなさい。\n\n（交差点の写真：信号付き交差点、右折レーン、歩行者等が見える）\n危険要因1：①右折時の対向車との衝突\n危険要因2：③横断歩道の歩行者との接触\n危険要因3：⑤左側から来る自転車との衝突", "choices": ["1=①-イ、6=③-ウ、8=⑤-エ", "1=②-ア、6=④-ウ、8=⑥-エ", "1=①-ア、6=③-イ、8=⑤-ウ", "1=②-イ、6=④-ア、8=⑥-ウ"], "ans": 0, "exp": "交差点の写真から危険予知の組合せを判断する問題。正解は1=①-イ、6=③-ウ、8=⑤-エ。"},
{"catIdx": 5, "year": "令和2年度CBT試験", "qNo": "問1", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の運行管理に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業計画に従い業務を行うに必要な員数の運転者を常時選任しておかなければならない。", "事業者は、運行管理者の業務の遂行に必要な権限を当該運行管理者に与えなければならない。", "事業者は、事業用自動車の運行の安全の確保に関する業務を行わせるため、国土交通省令で定める員数の運行管理者を選任しなければならない。", "乗務員が有効に利用することができるように、営業所ごとに、休憩に必要な施設を整備し、かつ、乗務員に睡眠を与える必要がある場合には睡眠に必要な施設を整備しなければならない。"], "ans": [0, 2], "exp": "選択肢1は正しい（常時必要な員数の運転者選任）。選択肢3は正しい（運行管理者の員数の選任義務）。"},
{"catIdx": 5, "year": "令和元年8月試験", "qNo": "問3", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の運転者に対する指導・監督に関する次の記述のうち、正しいものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、運転者に対し、各トラック運送事業者が定める基準に従った指導及び監督を行えばよく、国土交通大臣が告示で定める基準は参考程度でよい。", "事業者は、特定の運転者（事故惹起運転者、高齢運転者、初任運転者）以外の運転者には適性診断を受けさせる必要がない。", "事業者は、事業用自動車の運行の安全を確保するために、「事業用自動車の運行の安全の確保に関し、国土交通大臣が告示で定める基準」に従って、運転者に対する適切な指導及び監督を行わなければならない。", "初任診断（初めて事業用自動車に乗務する前に受けさせる適性診断）は、都道府県が指定する適性診断施設でのみ受けさせることができる。"], "ans": 2, "exp": "事業者は国土交通大臣が告示で定める基準に従って運転者への指導監督を行わなければならない。"},
{"catIdx": 5, "year": "令和2年度CBT試験", "qNo": "問3", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が行う点呼の実施に関する次の記述のうち、正しいものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["乗務前の点呼は、必ず対面で行わなければならず、いかなる場合も電話等による点呼は認められない。", "業務前及び業務後の点呼のいずれも対面（運行上やむを得ない場合を除く）により行うことができない業務においては、電話その他の方法による点呼のほか、中間点呼を行わなければならない。", "乗務後の点呼は、対面でも電話でも実施可能であり、酒気帯びの有無についてはアルコール検知器を用いて確認する必要はない。", "補助者に点呼の全部を行わせることができる。"], "ans": 0, "exp": "写真から正解1と読み取られた。業務前後ともに対面ができない場合に中間点呼が必要という規定を問う問題。"},
{"catIdx": 5, "year": "令和3年3月試験", "qNo": "問4", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が行う運行管理に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、事業用自動車の定期的な点検整備の実施について、整備管理者に確認させ、その結果を運行管理者に報告させなければならない。", "一般貨物自動車運送事業者は、国土交通省令で定めるところにより、事業用自動車の運行を管理する営業所ごとに、一定の数の運行管理者を選任しなければならない。", "事業用自動車の日常点検の実施については、運行管理者が確認を行い、運行の可否を決定するものとする。", "事業者は、運行管理者の業務の遂行に必要な権限を与えなければならない。"], "ans": [0, 1], "exp": "選択肢1は正しい（定期点検の確認・報告体制）。選択肢2は正しい（運行管理者の選任義務）。"},
{"catIdx": 5, "year": "令和2年8月試験", "qNo": "問5", "q": "道路運送車両の保安基準に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["貨物自動車（車両総重量8トン以上）は、非常信号用具を備えなければならない。非常信号用具は、夜間200メートル後方から確認できる赤色の灯光を発するものでなければならない。", "自動車の接地部分は、地面との摩擦により十分な駆動力及び制動力を生じ、かつ、操縦性能を損なうおそれのある溝の深さ1.6ミリメートル以下の空気入タイヤ（二輪自動車及び被けん引自動車を除く）は使用してはならない。", "自動車の前面ガラス及び側面ガラス（告示で定めるものを除く）は、フィルムが貼付された状態において、運転者が交通状況を確認するために必要な視野の範囲に係る部分における可視光線の透過率が70%以上のものでなければならない。", "緊急自動車（消防自動車、警察自動車、救急自動車及びその他の自動車で、保血液を保管する場所で血液を輸送するための特別の構造を有するもの等）は、赤色の警光灯をつけなければならない。"], "ans": 0, "exp": "非常信号用具は「200メートル後方」ではなく「150メートル後方」から確認できるものでなければならない。"},
{"catIdx": 5, "year": "令和2年度CBT試験", "qNo": "問6", "q": "次の文中、A、B、C、Dに入るべき語句を下の枠の中から選び、正しい組み合わせを1つ選びなさい。\n\n「一般貨物自動車運送事業者は、（A）の規定に従い、（B）を作成しなければならない。なお、この（B）には、（C）及び（D）等について記載されている。」", "choices": ["A=貨物自動車運送事業輸送安全規則、B=運行指示書、C=運行経路、D=運転者の乗務時間", "A=貨物自動車運送事業輸送安全規則、B=乗務員台帳、C=乗務員の氏名、D=事故歴", "A=道路交通法、B=運転日報、C=運転時間、D=経路", "A=労働基準法、B=乗務記録、C=拘束時間、D=休息期間"], "ans": 1, "exp": "貨物自動車運送事業輸送安全規則の規定に従い「乗務員台帳」を作成し、乗務員の氏名・事故歴等を記載しなければならない。"},
{"catIdx": 5, "year": "令和3年3月試験", "qNo": "問7", "q": "道路交通法に定める速度等に関する次の記述のうち、正しいものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["高速自動車国道において、大型貨物自動車の最高速度は時速100キロメートルである。", "一般道路において、大型貨物自動車の最高速度は時速60キロメートルを超えてはならない。", "悪天候（霧、雨、雪等）により視界が悪い場合は、道路標識で指定された最高速度の半分以下に速度を落とさなければならない。", "トンネル内では、すべての場合において追い越しが禁止されている。"], "ans": 2, "exp": "写真から正解3と読み取られた。一般道路での大型貨物の最高速度60km/hが正しい。"},
{"catIdx": 5, "year": "令和2年8月試験", "qNo": "問8", "q": "労働基準法に定める健康診断等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、常時使用する労働者に対し、1年以内ごとに1回、定期的に、一般健康診断を行わなければならない。", "事業者は、深夜業を含む業務に常時従事する労働者に対し、6ヵ月以内ごとに1回、定期的に、所定の健康診断（特定業務従事者健康診断）を行わなければならない。", "事業者は、健康診断の結果について、労働者に通知しなければならない。ただし、当該労働者が不安になるおそれがある場合には、通知しないことができる。", "事業者は、医師から就業上の配慮が必要との意見を受けた場合、当該労働者の就業場所の変更等の措置を講じなければならない。"], "ans": 3, "exp": "健康診断の結果はすべての労働者に通知しなければならず、「不安になるおそれがある」等の理由で通知しないことはできない（選択肢3が誤り。しかし写真の正解は4）。写真から正解4と読み取った。"},
{"catIdx": 5, "year": "令和2年8月試験", "qNo": "問9", "q": "次の文中、A、B、C、Dに入るべき語句を下の枠の中から選び、正しい組み合わせを1つ選びなさい。\n\n「改善基準において、（A）に係る拘束時間は、（B）に定める拘束時間の限度に影響を与えないものとし、（C）については（D）として取り扱うものとする。」", "choices": ["A=フェリー乗船中、B=1日及び1ヵ月、C=フェリー乗船中の時間、D=休息期間", "A=フェリー乗船中、B=1ヵ月のみ、C=フェリー乗船中の時間、D=労働時間", "A=長距離運行中、B=1週間、C=休憩時間、D=休息期間", "A=宿泊中、B=1日及び1ヵ月、C=宿泊中の時間、D=休息期間"], "ans": 0, "exp": "フェリー乗船中の時間は拘束時間の算定に影響を与えず、当該時間は休息期間として取り扱う。"},
{"catIdx": 5, "year": "令和2年8月試験", "qNo": "問10", "q": "運行管理者は、以下の運行計画を立てた。この運行計画に関する改善基準への適合性について、正しいものを1つ選びなさい。\n\n（運行計画）\nA営業所→B工場→C料金所（高速）→D料金所（高速）→E地点→F地点→G地点\n各区間の距離・速度・時間が図表で示されている", "choices": ["この運行計画は、改善基準のすべての項目に適合している。", "連続運転時間が4時間を超えており、改善基準に違反している。", "1日の拘束時間が15時間を超えており、改善基準に違反している。", "休息期間が8時間未満であり、改善基準に違反している。"], "ans": 1, "exp": "写真の図表を分析すると、C料金所とD料金所間の高速道路区間において連続運転時間が4時間を超えており、改善基準に違反している。正解は2（ア：3、イ：1）と読み取れる。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問1", "q": "貨物自動車運送事業に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。\n\n1. 一般貨物自動車運送事業とは、他人の需要に応じ、有償で、自動車（三輪以上の軽自動車及び二輪の自動車を除く。）を使用して貨物を運送する事業であって、特定貨物自動車運送事業以外のものをいう。\n2. 一般貨物自動車運送事業を経営しようとする者は、国土交通大臣の認可を受けなければならない。\n3. 国土交通大臣が標準運送約款を定め公示した場合（これを変更し公示した場合を含む。）において、一般貨物自動車運送事業者が、標準運送約款と同一の運送約款を定めているとき、又は現に定めている運送約款についての運送契約に関し、標準運送約款と同一のものに変更したときは、国土交通大臣の認可を受けたものとみなす。\n4. 事業用自動車（被けん引自動車を除く。）の保有車両数が200両以上の事業者は、国土交通省令で定める安全管理規程を定め、国土交通大臣に届け出なければならない。\n5. 一般貨物自動車運送事業者は、その事業の輸送の安全を確保するために、輸送の安全に関する基本的な方針を定め、かつ、これを遵守するとともに、輸送の安全確保のための指置その他の輸送の安全にかかわる情報を公表しなければならない。", "choices": ["選択肢1が誤り", "選択肢2が誤り", "選択肢3が誤り", "選択肢5が誤り"], "ans": 1, "exp": "一般貨物自動車運送事業の経営には「認可」ではなく「許可」が必要。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問2", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が定めなければならない次の文中のA、B、C、Dについて、語句の組み合わせとして、正しいものを1つ選びなさい。\n\n「事業者の文中の、A・B・C・Dに入るべき字句を次の選択肢の中から1つずつ選びなさい。\n一般貨物自動車運送事業者は、事業用自動車の運転者の過労防止のため、（A）勤務交替基準に照らして、その他事業用自動車の運転者の休息の確保等に関する事項を定め、これを従業員に対し、運転に係る業務に従事する際の適切な（B）の確保、事業用自動車の運転者の（C）に関する事項及び（D）の措置を講じなければならない。」\n①必要となる員数の　②乗務時間　③乗務員の健康状態　④休憩時間　⑤運行管理規程　⑥医学的知見", "choices": ["A=①必要となる員数の、B=④休憩時間、C=③乗務員の健康状態、D=⑥医学的知見", "A=⑤運行管理規程、B=②乗務時間、C=③乗務員の健康状態、D=⑥医学的知見", "A=①必要となる員数の、B=②乗務時間、C=③乗務員の健康状態、D=⑥医学的知見", "A=⑤運行管理規程、B=④休憩時間、C=③乗務員の健康状態、D=⑥医学的知見"], "ans": [2, 4], "exp": "写真の解答表より A=①必要となる員数の、B=⑤乗務時間、C=⑥医学的知見 等の組合せとなる。正解は3、5の組合せ。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問3", "q": "一般貨物自動車運送事業の運行管理者が行うべき業務として次のうち、一般貨物自動車運送事業法令に照らし、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車運転者が事故報告書（第5条）の規定により定められた事故警報の措置に基づき運転する事業用自動車に乗務する前に、運転者の乗務について当該乗務に従事する運転者の疲労、疾病その他の理由により、事業用自動車の安全な運転が困難になるおそれのある状態での乗務を行わないよう確認及び指導すること。", "休憩又は睡眠のための時間及び勤務後の時間の確保のために必要な勤務の状況の把握に努めること。", "法令の規定により（65才以上の者）等特定の運転者について国土交通大臣の認可を受けて適性の認定を受けさせること。", "従業員に対し、効果的かつ適切に指導及び監督を行うため、基本的な方針を策定し、これに基づく輸送の安全確保のための業務に関し、当該事業用自動車の運行の管理をする者及び事業者にあっては、運行管理者等の業務を行うこと。", "運転者が長距離運転又は夜間の運転に従事する場合であって、疲労等により安全な運転を継続することができないおそれがあるときは、あらかじめ、当該運転者と交替するための運転者を配置しておくこと。"], "ans": [1, 2], "exp": "写真の解答表より問3の正解は2と3（2=正しい、3=正しい）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問4", "q": "一般貨物自動車運送事業者の事業用自動車の運転者等に対する点呼に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["業務前の点呼は、対面（運行上やむを得ない場合は電話その他の方法）により行い、業務後の点呼については、業務上やむを得ない場合は対面によらないことができる。このため点呼においては、少なくとも酒気帯びの有無についてのみ確認すれば足りる。", "業務前及び業務後の点呼のいずれも対面により行うことができない乗務（やむを得ない場合を除く）については、電話その他の方法による点呼のほか、中間点呼を行わなければならない。", "業務後の点呼においては、当該乗務に係る事業用自動車、道路及び運行の状況について報告を求めなければならない。", "点呼記録は、少なくとも3分の1については運行管理者が行わなければならない。", "当該営業所の運行管理者が少なくとも3分の1の点呼を行う場合においても、業務前及び業務後の点呼のいずれも対面で行わなければならないときは、補助者にすべての点呼を行わせることができる。"], "ans": [0, 2], "exp": "写真の解答表より問4の正解は1と3（選択肢1、3が正しい）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問5", "q": "次の自動車事故に関する記述のうち、一般貨物自動車運送事業者が自動車事故報告規則に基づき国土交通大臣に報告しなければならない事故に該当するものをすべて選びなさい。", "choices": ["事業用自動車が走行中にセンターラインを越えて対向車線を走行し、対向車との事故を起こした。この事故により乗用車の運転者及び当該事業用自動車の運転者が共に重傷を負った。対向車線には歩行者はいなかったが、乗用車に乗っていた者5人が共に重傷を負い、歩行者8人の歩行者が軽傷を負った。", "事業用自動車が市街地を走行中に運転操作を誤り、歩道に乗り上げ8人の歩行者が負傷をした。この事故で事業用自動車の運転者により乗用車等の運転者が重傷を負った。", "ガソリンを積載したタンクローリーが中央分離帯を飛び越えて対向車線で事故を起こし、ガソリンが漏れ、ハートマークを起こした。このガソリンにより積載されたガソリンの一部が漏れた。", "事業用自動車が、交差点で信号待ちをして停車していた乗用車に追突し、乗用車の後方部分が損傷した。当該乗用車の運転手1人が死亡した。", "事業用自動車が、交差点で信号待ちをしていた乗用車の発見が遅れ、ブレーキをかける間もなく追突した。この事故で、当該乗用車に乗っていた乗客10人以上に負傷を要する傷害を受けさせた場合において、当該負傷者を医師の治療を受けさせて30日以上の治療を要する場合には当然速報を要する。"], "ans": [0, 2], "exp": "写真の解答表より問5の正解は1と3（5人以上の死傷者発生、危険物の漏洩等は報告必要）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問6", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の法令等についての遵守等の定めに関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、運転の途中において、運行指示書に当該変更の内容を記載し、これにより変更後の運行の変更の内容をその他の方法で当該変更に係る乗務員等に対して適切に告知するとともに、及び当該乗務員等が携行している運行指示書に当該指示の内容を記載させなければならない。", "事業者は、乗務員を常時選任しておかなければならない。この場合において、当該乗務員は日々雇い入れられる者、2ヵ月以内の期間を定めて使用される者又は試みの使用期間中の者（14日を超えて引き続き使用されるに至った者を除く。）であってはならない。", "事業者は、乗務員の健康状態の把握に努め、疾病、疲労、睡眠不足その他の理由により安全な運転をし、又はその補助をすることができないおそれがある乗務員を事業用自動車に乗務させてはならない。", "保安員は、日々雇い入れられる者及び2ヵ月以内の期間を定めて使用される者については、乗務させることができない。", "特定貨物自動車運送事業を経営する者であっても、500キロメートル以上の距離での貨物輸送事業では、当該事業者の貨物輸送は特別額合せ貨物輸送に係るものとして、その運行に従事させる者の運行に関する指導及び監督を行わなければならない。"], "ans": [0, 4], "exp": "写真の解答表より問6の正解は1と5。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問7", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の輸送の安全を確保するための業務等に関する次の記述のうち、正しいものをすべて選びなさい（誤っているものは選択しないこと）。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車は、運行の途中において、輸送の安全を確保するために業務に従事する者は、当該業務を通じて安全な運行を行う義務を負い、常に安全な業務に従事するよう努め、かつ、当該事業者のその他の業務に関し、当該業務を行う者に対し、業務上の指揮・命令等を行うことができる。", "貨物自動車運送事業者は、安全投資計画に従い業務を行うに必要な員数の従業者を常時雇用しなければならない。", "自動車運転者（被けん引自動車を除く。）の保有車両数が200両以上の場合は、安全管理規程を定め、安全統括管理者を選任しなければならない。", "運行管理者は、当該事業用自動車の運行に係る乗務員等の業務について、安全管理規程に基づき、最低限の安全確保のため必要な権限を与えられているものに限り、当該乗務員等の業務に関し、当該事業者の他の業務を担当する者に対し、職務上の指揮・命令等を行うことができる。", "貨物自動車運送事業者は、その事業の貨物の特性に応じた、輸送の安全のための基準を遵守させること、及び当該基準に従って安全を確保するための必要な管理を行うことが事業者義務として課せられている。"], "ans": [0, 4], "exp": "写真の解答表より問7の正解は1と5。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問8", "q": "一般貨物自動車運送事業者の運行管理者の選任等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["一般貨物自動車運送事業者は、運行管理者（補助者）の業務を補助させるための補助者を選任したときは、国土交通大臣（地方運輸局長）に届け出なければならない。", "一般貨物自動車運送事業者は、事業用自動車（被けん引自動車は60両（うち、被けん引自動車を除く。）に届け出なければならない。", "事業用自動車の保有車両数が60両（うち、被けん引自動車を除く。）に届け出なければならない。", "事業者は、運行管理者を2名以上選任する場合には、新たに選任した運行管理者は、当該選任した日の前1年（当該年度）の基礎講習又は一般講習を受講しなければならない。", "国土交通大臣は、運行管理者資格者証の交付を受けた後、貨物自動車運送事業者において運行管理者として選任された経験が通算5年以上経過したときは、運行管理者一般講習の受講を免除することができる。"], "ans": [0, 4], "exp": "写真の解答表より問8の正解は1と5。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問9", "q": "道路運送車両の登録等についての次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車登録番号標及びこれに記載された自動車登録番号の表示は、国土交通省令で定めるところにより、自動車の前面及び後面の位置に、国土交通大臣の任意の位置に取り付けることができるものとする。", "一時抹消登録を受けた自動車の所有者は、当該自動車（国土交通省令で定めるものを除く。）の用途を廃止したときは、自動車の用途を廃止した日から15日以内に、国土交通大臣に届け出なければならない。", "登録自動車の使用者は、当該自動車が道路運送車両法第69条第2項の規定により自動車登録番号標を返納し、同法で定める規定により自動車登録番号標を返し、自動車検査証を返さなければならない。ただし、整備のため特に必要がある場合にやむを得ない事由がある場合は、この限りでない。", "自動車の使用者の所在地、当該自動車の使用の本拠の位置等に変更があったときは、国土交通大臣の行う変更登録の申請をしなければならない。", "何人も、国土交通大臣若しくは封印の取付けをした封印受託者等が取付けをした自動車登録番号標は、これを取り外してはならない。ただし、整備のために必要がある場合であって、整備のための移動ができないときは、この限りでない。"], "ans": [1, 2], "exp": "写真の解答表より問9の正解は2と3。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問10", "q": "自動車の点検及び整備に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業用自動車は、1日1回、その運行を開始する前において、運転者により運行の開始前の点検が行われるものとする。なお、点検の結果、事業用自動車が保安基準に適合しなくなるおそれがある状態にあるときは、使用者はその状態及び行き先を確認し、当該事業者に速やかに報告するものとする。", "自動車は、道路運送車両法の規定に基づき、3ヵ月（当該期間に対応する技術上の基準によることの合理的な理由がある場合にあっては、12ヵ月）ごとに、一般貨物自動車運送事業に使用される事業用自動車に対しては、3ヵ月ごとに1回定期点検整備をしなければならない。", "事業用自動車の定期点検整備の記録（点検整備記録簿）は、点検を行った日から2年間保存しなければならない。", "自動車の使用者は、自動車検査証の記載事項に変更があったときは、その事由が生じた日から15日以内に、国土交通大臣に申請をしなければならない。", "整備管理者は、整備管理者として選任される前提として、貨物自動車運送事業法で定める一定の要件（実務経験及び研修等）を満たす者でなければならない。"], "ans": [1, 2], "exp": "写真の解答表より問10の正解は2と3（3ヵ月定期点検、点検整備記録簿は2年間保存）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問11", "q": "道路運送車両法に定める自動車の使用の管理に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["大型貨物自動車運送に使用する自動車は、3ヵ月以内ごとに1回、定期的に点検しなければならない。", "事業者は、定期点検（3ヵ月ごと）の記録を最終記入日から1年間保存しなければならない。", "自動車（二輪の自動車を除く）の使用者は、自動車の点検及び整備等に関する事項について補助するため、整備管理者を選任しなければならない。", "自動車の使用者は、事業用自動車の整備が完了しない場合に、事業用自動車を運行の用に供することができない。", "自動車の使用者は、整備管理者に対して事業用自動車の整備等について、その業務に必要な権限を与えなければならない。"], "ans": [0, 2], "exp": "写真の解答表より問11の正解は1と3。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問12", "q": "道路運送車両の保安基準及びその細目を定める告示に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車（二輪自動車及び牽引自動車を除く。）の空気入ゴムタイヤの接地部分は全幅の4分の3以上にわたり滑り止めを施したものであり、滑り止めの部分の深さは1.6ミリメートル以上でなければならない。", "自動車に備えなければならない非常信号用具は、夜間において150メートルの距離から確認できる赤色の灯光を発するものでなければならない。", "「緊急自動車」とは、消防自動車、警察自動車、救急自動車、保血液を保管する場所で血液を保管する自動車、公共機関等が使用する応急の緊急の業務に使用するその他の自動車で国土交通大臣及びその他の国土交通省令で定めるものをいう。", "自動車の後面には、走行用前照灯（その後方150メートルの距離から照射した場合において、後方にある障害物を確認できる性能を有するものに限る。）を走行用前照灯として使用してはならない。自動車の後面に走行用前照灯をつける場合にあっては、これらの反射光を確認できるものを備えなければならない。", "自動車の前面ガラス及び側面ガラス（告示で定めるものを除く。）は、フィルムが貼り付けられた場合において、可視光線の透過率が70%以上のものでなければならない。"], "ans": [0, 2], "exp": "写真の解答表より問12の正解は1と3。選択肢1：タイヤの溝深さは「1.6mm以上」が正しい基準。選択肢3：「緊急自動車」の定義に誤りがある。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問13", "q": "道路交通法に照らし、道路の交通に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["道路標識とは、交通に関し、規則、指示及び警戒の各標識（記号又は文字により示す場合を含む。）及び当該道路の部分を車両が通行することが道路に示される場合を含む。", "車両通行帯とは、車両が道路の定められた通行区分に従い1列に連なって進行するための道路の部分で道路標示により示されたものをいう。", "駐車とは、車両等が停止し、かつ、当該車両等から離れて直ちに当該車両等を運転することができない状態にある場合を含む。", "車両は道路の中央から右の方向（交差点において交差する道路の中央から右の部分にあって他の車両等を避けようとするときは一方の場合を除く。）を通行することができない。", "高齢運転者等専用駐車区間においては、歩いている場合であっても、空いているときは3分の1以上の時間は駐車することができる。"], "ans": [1, 2], "exp": "写真の解答表より問13の正解は2と3（車両通行帯の定義と駐車の定義が正しい）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問14", "q": "道路交通法に定める交通方法に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両は、道路外の施設又は場所に出入するためやむを得ない場合においては、歩道又は路側帯を横断することができる。この場合においては、その直前で一時停止し、かつ、歩行者の通行を妨げないようにしなければならない。", "車両は交差点を右折しようとするときは、交差点の中心の内側を徐行しながら通行しなければならない。ただし、道路標識等により通行すべき部分が指定されているときは、その指定された部分を通行しなければならない。", "緊急自動車が接近してきたときは、交差点の付近以外の場所においては、道路の左側（一方通行となっている道路においては、道路の左側に寄ることが支障となる場合にあっては、道路の右側）に寄って一時停止しなければならない。", "車両は、そこで停止してもよい場所における緊急の場合または停止が不可能な場合のほか、交差点の手前の側端から前後にそれぞれ5メートル以内の道路の部分においては、停車してはならない。", "高速道路を行こうとする車両は、交差点の当該方向へ進行しようとする場合には、その方向の交通量の状況を見て、他の交通に支障を与えないことが確認された後、その旨の方向指示器を操作しなければならない。"], "ans": [0, 3], "exp": "写真の解答表より問14の正解は1と4。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問15", "q": "道路交通法に定める灯火及び合図等についての次の記述のうち、正しいものをすべて選びなさい（誤っているものは選択しないこと）。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両（自転車以外の軽車両を除く。）の運転者が左折又は右折する場合は、（交差点又は交差点から30メートル手前の地点から）当該行為をする時間及び行動（交差点において左折又は右折するための場合の行動）の合図を行い継続しなければならない。", "一般道路において、車両等が同一方向に進行しながら進路を変えるときは、合図を行いなければならず、また、進路変更が終わったときにその合図を行わなければならない。", "車両は同一方向に走行している時において、自動車専用道路（高速自動車国道）のうち最高速度が50メートル（高速自動車国道及び自動車専用道路においては200メートル）以内となるような状況において、前照灯（走行用前照灯）等をつけなければならない。", "車両（自転車以外の軽車両を除く。）の運転者は、追越しをするときは、車幅灯（サイドマーカーランプ）をつけ、かつ、警音器を鳴らさなければならない。", "車両の運転者は、左折又は右折するときは、手や方向指示器又は灯火による合図等によりその合図を行わなければならない。道路外の施設若しくは場所に入るためにその直前で右折又は左折するときも同様である。"], "ans": [0, 4], "exp": "写真の解答表より問15の正解は1と5。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問16", "q": "道路交通法に定める停車及び駐車等に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["車両は、交差点の側端又は道路の曲がり角から5メートル以内の部分においては、駐車してはならない。", "車両は、道路の定めにより安全地帯が設けられている場所（安全地帯の側方及び前後の道路の部分）においては、駐車してはならない（路面電車の停留場の標識が設置されている場所は含まない。）。", "車両は、道路の曲がりかどから10メートル以内の道路の部分においては、停車及び駐車してはならない（道路標識等による指定がある場合及び優先場合を除く。）。", "車両は、火災報知機から1メートル以内の部分においては、駐車してはならない。", "車両は、道路工事が行われている場合（道路の施設に係る危険防止の措置が施されている場合に限る。）においては、道路の端から5メートル以内の部分（工事が行われていない部分）に停車し、又は駐車してはならない（道路標識等による指定がある場合を除く。）。"], "ans": [0, 1], "exp": "写真の解答表より問16の正解は1と2。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問17", "q": "道路交通法に定める運転者の遵守事項等に関する次の記述のうち、正しいものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["正当な理由がないのに、著しく他人に迷惑を及ぼすような方法により、急加速し、急ブレーキをかけ、又は不必要に警音器を鳴らすような行為をしてはならない。", "車両等の運転者は、乗用している自動車等から物を投げてはいけないが、飛散している物については、道路交通法上の運転者の遵守事項に抵触しない。", "車両等の運転者は、自動車の方向変換や危険回避のため、やむを得ない場合のほか、後退してはならない。ただし、後退するときには後続車や他者への合図を行うことを要しない。", "運転者は、自動車の中に乗って道路交通の停止を命ずる合図をした警察官に従わなければならないが、運転者の乗車状況によって、道路の状況により停止させる場合に従わなくてもよい。", "運転者は、道路上の動物等を発見した際は、自動車を停止し、又は徐行させて安全を確認するまで進行を続けてはならない。"], "ans": [1, 2], "exp": "写真の解答表より問17の正解は2と3。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問18", "q": "労働基準法（以下「法」という。）の定めに関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["法で定める労働条件の基準は最低のものであるから、当事者間の合意があれば、法第14条（契約期間）などを超える期間の雇用も可能である。したがって、5年を超える労働契約についても、合意によって締結することができる。", "労働契約は、労働者がその生活の基準として労働条件の低下を来すことのないよう締結してはならない。その同意により、当初よりも低い賃金の条件で締結することは認められるものではない。", "平均賃金とは、事業場別の過去に発生した期間の労働に従事した日以前の3ヵ月において、当該期間に当該業者が支払われた各一定の期間の賃金の総額を、当該期間の総日数で除した金額をいう。ただし、当該金額が、賃金の総額をその期間中に労働した日数の3分の2を超える額は「3分の2を超えた金額」とし、それ以外のときは「3分の2の金額」を下回ることとなる。", "出来高払制その他の請負制によって定められた賃金については、使用者は、労働時間に応じ一定額の賃金の保障をしなければならない。", "労働契約においては、少なくとも30日前に使用者が予告しなければならない労働者については、予告したうえで解雇することができる。"], "ans": [1, 2], "exp": "写真の解答表より問18の正解は2と3（労働条件の整備・平均賃金の計算）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問19", "q": "労働基準法に定める労働時間等に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["労働時間は、事業場を異にする場合においても、労働時間に関する規定の適用については通算する。", "使用者は、労働者に、休憩時間を除き1週間について40時間を超えて、労働させてはならない。", "3ヵ月単位の変形労働時間制を採用すると、3ヵ月を平均し1週当たりの労働時間が40時間を超えることなく、また特定された週が1週当たり52時間を超えることがない場合には、特定された週において40時間を超えて労働させることができる。ただし、業務の繁忙等から、3ヵ月において200時間を超えることができないこととされている。", "3ヵ月単位の変形労働時間制を採用すると、1ヵ月のうち3ヵ月の各月及び4日の特定された週の労働時間が、合計で1ヵ月に合計400時間を超えることになるような場合には、この制度を適用できない。"], "ans": 3, "exp": "写真の解答表より問19の正解は4。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問20", "q": "労働基準法の定めに関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["使用者は、当該事業場について、1週間以内に200時間を超えることができないことから、1ヵ月のうち3ヵ月を通じた総労働時間がそれぞれ400時間を超えないようにしなければならない。", "1年間の時間外及び休日の労働については、年間を通じて280時間を超えることはできない。ただし1ヵ月の平均及び3ヵ月を通じた時間外が40時間を超えることがない場合には、その制限を超える300時間まで認められる。", "使用者は、業務上の事由による負傷又は疾病にかかった労働者に対して、その療養のために必要な療養補償を行わなければならない。また、使用者は、一定の事由に当たる場合には療養補償の義務を負わない。", "3ヵ月単位の変形労働時間制においては、1ヵ月の合計が1ヵ月の労働時間を超えるように設定することはできないが、3月を通じた平均労働時間が40時間以内になるよう設定した場合には、制限される。", "4（4，6，7，10，12）の月は，始業時刻から終業時刻までの1日の所定労働時間が8割以上で、かつ、その者が「前6ヵ月ごと以内に1回」の定期健康診断を義務付けられているが、この健康診断を省略できる者は例外的に7人以下の者のみ対象となる。"], "ans": [2, 3], "exp": "写真の解答表より問20の正解は3と4。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問21", "q": "自動車運転者の労働時間等の改善のための基準（以下「改善基準」という。）に定める拘束時間及び休息期間に関する次の記述のうち、誤っているものを1つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["連続運転時間（1回がおおむね連続10分以上で、かつ合計が30分以上の運転の中断をすることなく連続して運転する時間をいう。）は、4時間を超えないものとする。", "2段階目以降の運転の中断の合計は、1時間40分＋2時間30分＋1時間中断で、合計30分以上の中断があれば、中断後の連続運転時間はリセットされる。", "1日の拘束時間は、原則として13時間を超えてはならず、最大拘束時間（特定日の拘束時間）は4時間（特定日の前後に実施した場合は3時間）以内の休息期間が与えられているものとする。", "休息期間は、使用者の拘束を受けない期間のことをいい、継続した8時間以上の休息期間をいう。"], "ans": [1, 2], "exp": "写真の解答表より問21の正解は2と3。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問22", "q": "下図は、貨物自動車運送事業に従事する自動車運転者（1人乗務）の5日間の運行状況（フェリー乗船あり）を示したものである。この運行における拘束時間等について、改善基準に照らして正しいものを1つ選びなさい。", "choices": ["5日間の総拘束時間は54時間で、改善基準内である。", "2日目の拘束時間が最も長く14時間であり、改善基準の最大拘束時間以内で適法である。", "フェリー乗船中の時間を含む3日目の拘束時間は改善基準に適合している。", "5日目の休息期間が不足しており、改善基準に違反している。"], "ans": 2, "exp": "写真の解答表より問22の正解は3（フェリー乗船を含む運行計画の評価）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問23", "q": "下表は、貨物自動車運送事業に従事する自動車運転者の1ヵ月ごとの拘束時間の例を示したものである。次の1～4のうち、「自動車運転者の労働時間等の改善のための基準」に違反しているものを1つ選びなさい。", "choices": ["4月：拘束来275時間、5月：276時間、6月：268時間、7月：280時間、8月：305時間、9月：269時間、10月：293時間、11月：268時間、12月：313時間、1月：270時間、2月：230時間、3月：285時間、1年間：3392時間", "4月：拘束来280時間、5月：270時間、6月：291時間、7月：236時間、8月：280時間、9月：286時間、10月：272時間、11月：282時間、12月：306時間、1月：285時間、2月：279時間、3月：252時間、1年間：3409時間", "4月：拘束来295時間、5月：265時間、6月：270時間、7月：305時間、8月：263時間、9月：281時間、10月：288時間、11月：285時間、12月：280時間、1月：285時間、2月：302時間、3月：272時間、1年間：3391時間", "4月：拘束来290時間、5月：283時間、6月：292時間、7月：293時間、8月：265時間、9月：282時間、10月：285時間、11月：276時間、12月：290時間、1月：287時間、2月：266時間、3月：289時間、1年間：3398時間"], "ans": [0, 1], "exp": "写真の解答表より問23の正解は1と2（1年間の拘束時間が3,516時間を超えているか、連続する月で320時間を超えているか等を確認）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問24", "q": "一般貨物自動車運送事業者（以下「事業者」という。）が事業用自動車の運転者に対して行う指導及び監督に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["自動車が追越し又は追い越しをしようとするときは、前方不注意による追突事故を予防するため、追い越しを開始する前に必ず追い越しを行う旨のホーンを鳴らさなければならない。", "走行中の危険予測に関する教育の実施にあたっては、ドライブレコーダー、デジタコなどを活用した教育を行うなど効果的かつ適切な方法で行うよう努めなければならない。", "事業者は、昨年今年と連続して交通事故を起こしている運転者に対しては、社内教育（アルコール7（%）の場合は個人差はあるが飲酒後概ね4時間後の運転は問題ないとされることから）これらを参考に、社内教育の観点から飲酒運転防止の指導をしている。", "ドライブレコーダーの映像等をもとに連続して交通事故をもとに事故の原因を究明するとともに、事故の原因と関連する指導をするよう指導している。", "走行中の事業用自動車の発見が遅れて負傷者を生じた場合においては、その後の救護のために、事故を報告した上で、他の業者の手配を行うことは適切ではない。"], "ans": [2, 4], "exp": "写真の解答表より問24の正解は3と5。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問25", "q": "次の自動車事故の記述のうち、一般貨物自動車運送事業者が、下記の事故後において事業者が行うべき対応として適切なものをすべて選びなさい（誤っているものは選択しないこと）。", "choices": ["事業者の事業用自動車が走行中にセンターラインを越えて対向車に衝突した。事業者は対向車の被害者に対し、賠償をし、事故の内容・原因の分析を行い、ドライブレコーダー・デジタコのデータを分析し、原因を分析した結果から、ドライブレコーダー等の事故前後の映像を参考に再発防止策を策定した。", "事故現場において、自社の事業者の事故によって生じた死亡者に対し、緊急連絡をとることができるものに、当該事故を報告した場合には、速報として適切である。", "運行管理者は、当該負傷者に対し、当該事業者があるところに連絡して、その後の処置を取り仕切った後、運行管理者として次の乗務に向けた運行管理の業務を行った。", "事業者の事業用自動車の運転者が交通事故を起こし、警察に通報するとともに、所定の措置を取り、事業者が当該事故について所定の報告書（「自動車事故報告書」）を提出した場合の対応は適切ではない。", "運行管理者は、事故が発生した当日の運行前の点呼において、当該事業用自動車の運転者の体調管理を適切に行なっていたが、突如として事故が発生した場合であっても、事業者は当該事故について所定の報告書を提出しなければならない。"], "ans": [0, 3], "exp": "写真の解答表より問25の正解は1と4。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問26", "q": "一般貨物自動車運送事業者（以下「事業者」という。）の健康管理に関する次の記述のうち、正しいものを2つ選びなさい。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["事業者は、運転者が医師の診断を受ける際は、その旨を伝え、薬を処方されたとき、その副作用等について説明するよう医師に対して要求しなければならない。", "一部の運転者については、乗務中の当該健康診断に際し、業務に従事している状態でも、事業者はこの業務を継続させることができないものとする。", "事業者は、深夜業後1年以内に1回定期的に、所定の健康診断（医師、及び日視等による確認）を実施し、アルコール判断器等の検知器による確認の実施に係る必要はない。", "事業者は、乗務員の点呼における自動車運転中の当該確認において疲労等の状況によっては、当該事業用自動車を運行の用に供してはならない。", "自動車運転者が安全に乗務できる健康状態にあるかどうかを確認するためには、乗務前の点呼における健康状態の確認（大血管疾患（急性心臓疾患、心不全等）や、大動脈解離、大動脈瘤破裂等）が起こると、ショック状態、意識障害、心拍数急激な増加を来たり、運転を継続することができなくなるとそれがある。このため、自動車運転者が早期発見・早期予防が重要となってくる。"], "ans": [0, 3], "exp": "写真の解答表より問26の正解は1と4（健康管理・乗務禁止の要件）。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問27", "q": "交通事故防止対策に関する次の記述のうち、適切なものをすべて選びなさい（誤っているものは選択しないこと）。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["適性診断は、運転者の運転行動や運転適性度が安全運転にとって好ましい方向へ変化するように動機付けを行うことにより、運転者自身の安全意識を向上させるものであり、ヒューマンエラーによる交通事故の発生を未然に防止するための有効な手段となっている。", "アンチロック・ブレーキシステム（ABS）は、急ブレーキをかけた時などに、タイヤがロック（回転が止まること）するのを防ぐことにより、車両の進行方向の安定性を保ち、ハンドル操作で障害物を回避できる可能性を高める装置である。ABSを効果的に作動させるためには、できるだけ強くブレーキを踏み続けることが重要であり、この点を運転者等に指導する必要がある。", "交通事故の多くは、見かけ上は運転者の運転操作ミスや交通違反等の人的要因によって発生しているが、その背景には、交通違反をせざるを得なかったりすることに繋がる背景要因が潜んでいることが多い。事故の背景にある本質的な要因を把握し、その要因を取り除く対策を行うことが重要である。", "デジタル式運行記録計は、自動車の運行中、交通事故や急ブレーキ、急ハンドルなどにより当該自動車が一定以上の衝撃を受けると、その前後数十秒の映像などを記録する装置、または、自動車の運行中常時記録する装置であり、事故防止対策の観点から有効に活用することができる。", "交通事故防止を普及させる手法として、知識を普及させることに重点を置くグループ討議や「参加体験型」研修等、運転者が参加する交通事故防止対策の有効な手段となっている。"], "ans": [0, 1], "exp": "写真の解答表より問27の正解は1と2。"},
{"catIdx": 5, "year": "実践模擬問題", "qNo": "問28", "q": "自動車の運転者の運転に関する次の記述のうち、適切なものをすべて選びなさい（誤っているものは選択しないこと）。なお、解答にあたっては、各選択肢に記載されている事項以外は考慮しないものとする。", "choices": ["追越しをする場合は、一車線を超える広い幅の道路に進入することになるが、その行動においては安全な速度と方法により行うことが必要で、また、追越しを完了した時点ではその合図（方向指示器）を行うことを忘れがちである。したがって、追越しを行う際にはその合図を行い、追越し完了後も合図を継続しなければならない。", "一般道路では、自動車の性能に対して、その前を走る車が遅い場合に追越しを行うことがある。したがって、その行為をする場合において、運転者の方向感覚やカーブの見通し等、反対向きの走行時で対向車の状況を考慮しなくてよいとすることができる。", "自動車がカーブを走行するときは、曲がりの大きさや速度等によって遠心力の大きさが変わり、曲率半径が同一であれば速度が大きいほど遠心力の大きさが増す。したがって、自動車の中の重心の高さや重心の位置によって横転の危険性が高まるものである。", "衝突事故の前後数十秒の映像は、複数のドライブレコーダーにより事故の状況及びその前後の映像に記録することができるが、それを活用するためには、事故に関連するものに限り保存することが有効である。これにより、当該事業所は映像記録の方法を含め適切な指示を行わなければならない。", "運転中の疲労については、スマートフォン等の使用、並びに、車内内（スマートフォン等）などの影響を受けることがある。また、運転中の疲労により指示のある運転に指示されている場合には、目前から遮断して、日頃から運転者に対する注意を喚起する必要がある。"], "ans": [0, 3], "exp": "写真の解答表より問28の正解は1と4（選択肢4：ドライブレコーダーを活用した事故防止）。"},
